    <style>
      :root {
        --pink: #e94d7b;
        --pink-dark: #c93662;
        --pink-soft: #ffd6df;
        --cream: #fff1ec;
        --ink: #1d1d1d;
        --gold: #d8a24a;
      }

      * { box-sizing: border-box; }
      html { min-height: 100%; background: #25151c; }
      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: Montserrat, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        background:
          linear-gradient(115deg, rgba(255, 214, 223, .94), rgba(255, 241, 236, .78) 44%, rgba(233, 77, 123, .32)),
          url("https://images.unsplash.com/photo-1506929562872-bb421503ef21?auto=format&fit=crop&w=1800&q=85") center / cover fixed;
      }

      button, input, textarea, select { font: inherit; }
      button { cursor: pointer; }
      img { display: block; max-width: 100%; }

      .app-shell {
        width: min(100%, 430px);
        min-height: 100vh;
        margin: 0 auto;
        background:
          radial-gradient(circle at 18% 8%, rgba(255, 255, 255, .92), transparent 12rem),
          linear-gradient(180deg, rgba(255, 241, 236, .97), rgba(255, 214, 223, .96) 48%, rgba(255, 241, 236, .98));
        box-shadow: 0 0 70px rgba(36, 10, 22, .42);
        overflow: hidden;
        position: relative;
      }

      .app-shell::before,
      .app-shell::after {
        content: "";
        position: fixed;
        width: 160px;
        height: 260px;
        pointer-events: none;
        opacity: .16;
        background:
          linear-gradient(63deg, transparent 48%, var(--pink) 49% 51%, transparent 52%),
          radial-gradient(ellipse at top, var(--pink) 0 12%, transparent 13%);
      }

      .app-shell::before { left: calc(50% - 240px); top: 90px; transform: rotate(-16deg); }
      .app-shell::after { right: calc(50% - 245px); bottom: 20px; transform: rotate(18deg); }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: calc(14px + env(safe-area-inset-top)) 16px 12px;
        background: rgba(255, 241, 236, .82);
        border-bottom: 1px solid rgba(233, 77, 123, .18);
        backdrop-filter: blur(18px);
      }

      .brand {
        border: 0;
        background: transparent;
        padding: 0;
        text-align: left;
      }

      .brand span {
        display: block;
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        color: rgba(29, 29, 29, .62);
      }

      .brand strong {
        display: block;
        color: var(--pink);
        font-size: 18px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .top-actions { display: flex; align-items: center; gap: 8px; }

      .icon-button {
        min-width: 42px;
        height: 42px;
        border: 1px solid rgba(233, 77, 123, .18);
        border-radius: 999px;
        padding: 0 12px;
        background: rgba(255, 255, 255, .72);
        color: var(--pink-dark);
        font-size: 11px;
        font-weight: 900;
        box-shadow: 0 10px 24px rgba(201, 54, 98, .14);
      }

      .screen { padding: 18px 16px 98px; }

      .hero {
        min-height: calc(100vh - 36px);
        padding: calc(20px + env(safe-area-inset-top)) 20px calc(28px + env(safe-area-inset-bottom));
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        position: relative;
      }

      .hero-title {
        margin: 12px 0 0;
        color: var(--pink);
        font-family: "Bebas Neue", Impact, sans-serif;
        font-size: clamp(78px, 22vw, 116px);
        line-height: .78;
        text-transform: uppercase;
      }

      .script {
        color: #fff;
        font-family: "Great Vibes", cursive;
        font-size: .66em;
        font-weight: 400;
        text-transform: none;
        text-shadow: 0 0 5px #fff, 0 0 16px #ff6aa0, 0 0 34px var(--pink);
      }

      .eyebrow {
        font-size: 11px;
        font-weight: 900;
        text-transform: uppercase;
        color: rgba(29, 29, 29, .72);
      }

      .polaroid-stack {
        position: relative;
        min-height: 340px;
        margin-top: 20px;
      }

      .polaroid {
        position: absolute;
        background: #fff;
        padding: 8px 8px 36px;
        box-shadow: 0 24px 44px rgba(29, 29, 29, .22);
      }

      .polaroid.main {
        right: -16px;
        top: 0;
        width: 78%;
        transform: rotate(6deg);
      }

      .polaroid.small {
        left: -8px;
        bottom: 18px;
        width: 58%;
        transform: rotate(-8deg);
      }

      .polaroid img {
        width: 100%;
        height: 210px;
        object-fit: cover;
      }

      .polaroid.small img { height: 145px; }

      .paper-note {
        position: absolute;
        right: 12px;
        bottom: 0;
        width: 188px;
        padding: 18px 16px;
        background: #fff8f4;
        transform: rotate(-4deg);
        box-shadow: 0 18px 32px rgba(201, 54, 98, .18);
        clip-path: polygon(2% 5%, 98% 0, 96% 95%, 5% 100%);
      }

      .paper-note p {
        margin: 0;
        font-size: 11px;
        font-weight: 900;
        text-transform: uppercase;
        line-height: 1.8;
      }

      .login-card {
        border: 1px solid rgba(255, 255, 255, .7);
        border-radius: 28px;
        padding: 16px;
        background: rgba(255, 255, 255, .68);
        box-shadow: 0 24px 60px rgba(201, 54, 98, .23);
        backdrop-filter: blur(18px);
      }

      .input,
      .textarea,
      .select {
        width: 100%;
        border: 1px solid rgba(233, 77, 123, .28);
        border-radius: 14px;
        background: rgba(255, 255, 255, .88);
        color: var(--ink);
        font-size: 13px;
        font-weight: 800;
        outline: 0;
      }

      .input,
      .select {
        min-height: 48px;
        padding: 0 13px;
      }

      .textarea {
        min-height: 92px;
        padding: 12px 13px;
        resize: vertical;
        line-height: 1.55;
      }

      .input:focus,
      .textarea:focus,
      .select:focus {
        border-color: var(--pink);
        box-shadow: 0 0 0 4px rgba(233, 77, 123, .14);
      }

      .primary,
      .secondary,
      .danger {
        min-height: 48px;
        border-radius: 14px;
        padding: 0 15px;
        font-size: 11px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .primary {
        width: 100%;
        border: 0;
        background: var(--pink);
        color: white;
        box-shadow: 0 0 18px rgba(233,77,123,.52), 0 16px 32px rgba(201,54,98,.26);
      }

      .secondary {
        border: 1px solid rgba(233, 77, 123, .2);
        background: rgba(255, 255, 255, .72);
        color: var(--ink);
      }

      .danger {
        border: 1px solid rgba(201, 54, 98, .32);
        background: rgba(201, 54, 98, .1);
        color: var(--pink-dark);
      }

      .error {
        margin: 10px 0 0;
        color: var(--pink-dark);
        font-size: 12px;
        font-weight: 800;
      }

      .tabbar {
        position: fixed;
        left: 50%;
        bottom: 0;
        z-index: 30;
        width: min(100%, 430px);
        transform: translateX(-50%);
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
        background: rgba(255, 241, 236, .92);
        border-top: 1px solid rgba(233, 77, 123, .16);
        backdrop-filter: blur(18px);
      }

      .tabbar button {
        min-height: 54px;
        border: 0;
        border-radius: 18px;
        background: transparent;
        color: rgba(29, 29, 29, .55);
        font-size: 10px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .tabbar button.active {
        background: rgba(233, 77, 123, .12);
        color: var(--pink-dark);
      }

      .section-head {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }

      .section-head h1,
      .section-head h2 {
        margin: 0;
        color: var(--pink);
        font-family: "Bebas Neue", Impact, sans-serif;
        font-size: 44px;
        line-height: .9;
        text-transform: uppercase;
      }

      .section-head p {
        margin: 4px 0 0;
        font-size: 12px;
        font-weight: 800;
        color: rgba(29, 29, 29, .58);
      }

      .card {
        border: 1px solid rgba(233, 77, 123, .15);
        border-radius: 8px;
        background: rgba(255, 255, 255, .7);
        box-shadow: 0 14px 32px rgba(201, 54, 98, .12);
        overflow: hidden;
      }

      .course-hero {
        min-height: 250px;
        padding: 18px;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        color: #fff;
        background:
          linear-gradient(180deg, rgba(29, 29, 29, .08), rgba(29, 29, 29, .76)),
          url("./assets/girls-miami.png") center 20% / cover;
      }

      .course-hero h1 {
        margin: 0;
        font-family: "Bebas Neue", Impact, sans-serif;
        font-size: 58px;
        line-height: .82;
        text-transform: uppercase;
      }

      .course-hero p {
        margin: 8px 0 0;
        font-size: 12px;
        font-weight: 800;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-top: 12px;
      }

      .stat {
        border-radius: 8px;
        padding: 12px 10px;
        background: rgba(255, 255, 255, .72);
      }

      .stat strong {
        display: block;
        color: var(--pink-dark);
        font-size: 19px;
        font-weight: 900;
      }

      .stat span {
        font-size: 10px;
        font-weight: 900;
        text-transform: uppercase;
        color: rgba(29, 29, 29, .58);
      }

      .progress-ring {
        width: 74px;
        height: 74px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        background: conic-gradient(var(--pink) var(--pct), rgba(233, 77, 123, .14) 0);
      }

      .progress-ring span {
        width: 58px;
        height: 58px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        background: var(--cream);
        font-size: 14px;
        font-weight: 900;
      }

      .lesson-list { display: grid; gap: 12px; }

      .lesson-card {
        width: 100%;
        display: grid;
        grid-template-columns: 84px 1fr 34px;
        gap: 12px;
        align-items: center;
        border: 1px solid rgba(233, 77, 123, .14);
        border-radius: 8px;
        padding: 10px;
        background: rgba(255, 255, 255, .74);
        text-align: left;
      }

      .lesson-thumb {
        height: 72px;
        width: 84px;
        border-radius: 7px;
        object-fit: cover;
        background: var(--pink-soft);
      }

      .lesson-card h3 {
        margin: 0;
        font-size: 14px;
        line-height: 1.2;
        text-transform: uppercase;
      }

      .lesson-card p {
        margin: 5px 0 0;
        color: rgba(29, 29, 29, .62);
        font-size: 11px;
        font-weight: 700;
        line-height: 1.4;
      }

      .check {
        width: 30px;
        height: 30px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        background: rgba(233, 77, 123, .12);
        color: var(--pink-dark);
        font-size: 10px;
        font-weight: 900;
      }

      .video-box {
        position: relative;
        min-height: 226px;
        border-radius: 8px;
        overflow: hidden;
        background:
          linear-gradient(180deg, rgba(29, 29, 29, .08), rgba(29, 29, 29, .82)),
          var(--poster) center / cover;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .play {
        width: 76px;
        height: 76px;
        border: 2px solid rgba(255,255,255,.7);
        border-radius: 999px;
        background: rgba(233, 77, 123, .74);
        color: white;
        font-size: 28px;
        box-shadow: 0 0 28px rgba(233, 77, 123, .65);
      }

      .watermark {
        position: absolute;
        inset: 0;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        opacity: .28;
        pointer-events: none;
        transform: rotate(-24deg) scale(1.18);
      }

      .watermark span {
        align-self: center;
        justify-self: center;
        color: #fff;
        font-size: 11px;
        font-weight: 900;
        text-shadow: 0 1px 3px rgba(0,0,0,.45);
      }

      .lesson-body { padding: 16px 0 0; }

      .lesson-body h1 {
        margin: 16px 0 6px;
        font-family: "Bebas Neue", Impact, sans-serif;
        color: var(--pink);
        font-size: 48px;
        line-height: .88;
        text-transform: uppercase;
      }

      .lesson-body p,
      .lesson-body li {
        font-size: 13px;
        font-weight: 650;
        line-height: 1.7;
      }

      .steps {
        padding: 0;
        margin: 14px 0;
        list-style: none;
        display: grid;
        gap: 10px;
      }

      .steps li {
        border-radius: 8px;
        padding: 12px;
        background: rgba(255, 255, 255, .7);
      }

      .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .resource {
        min-height: 126px;
        padding: 14px;
        border: 1px solid rgba(233, 77, 123, .14);
        border-radius: 8px;
        background: rgba(255, 255, 255, .72);
      }

      .resource strong {
        display: block;
        color: var(--pink-dark);
        font-size: 13px;
        text-transform: uppercase;
      }

      .resource span {
        display: block;
        margin-top: 7px;
        font-size: 11px;
        font-weight: 700;
        line-height: 1.45;
      }

      .admin-form { display: grid; gap: 10px; }
      .admin-panel { display: grid; gap: 12px; }

      .admin-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 12px;
        border-radius: 8px;
        background: rgba(255, 255, 255, .72);
      }

      .admin-row strong {
        display: block;
        font-size: 13px;
      }

      .admin-row span {
        font-size: 10px;
        font-weight: 900;
        color: rgba(29, 29, 29, .55);
        text-transform: uppercase;
      }

      .admin-tabs {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-bottom: 14px;
      }

      .admin-tabs button {
        min-height: 42px;
        border: 1px solid rgba(233, 77, 123, .18);
        border-radius: 12px;
        background: rgba(255, 255, 255, .7);
        font-size: 10px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .admin-tabs button.active {
        background: rgba(233, 77, 123, .14);
        color: var(--pink-dark);
      }

      .field-label {
        display: grid;
        gap: 5px;
        font-size: 10px;
        font-weight: 900;
        text-transform: uppercase;
        color: rgba(29, 29, 29, .62);
      }

      .notice {
        border-radius: 8px;
        padding: 12px;
        background: rgba(216, 162, 74, .16);
        font-size: 11px;
        font-weight: 800;
        line-height: 1.55;
      }

      .row-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      @media (min-width: 800px) {
        body { padding: 26px 0; }
        .app-shell {
          min-height: calc(100vh - 52px);
          border: 10px solid rgba(255, 255, 255, .58);
          border-radius: 46px;
        }
        .topbar { border-radius: 36px 36px 0 0; }
        .tabbar {
          bottom: 26px;
          border-radius: 0 0 36px 36px;
        }
      }
    </style>
  </head>

        redeemed: {},
        completed: [],
        course: defaultCourse
      };

      function clone(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function normalizeState(raw) {
        const base = clone(defaultState);
        return {
          ...base,
          ...raw,
          course: {
            ...base.course,
            ...(raw?.course || {}),
            settings: { ...base.course.settings, ...(raw?.course?.settings || {}) },
            lessons: raw?.course?.lessons?.length ? raw.course.lessons : base.course.lessons,
            resources: raw?.course?.resources?.length ? raw.course.resources : base.course.resources
          }
        };
      }

      function loadState() {
        try {
          const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY));
          if (parsed) return normalizeState(parsed);
        } catch {}
        return clone(defaultState);
      }

      function saveState(next) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
      }

      function makeCode() {
        const a = Math.random().toString(36).slice(2, 6).toUpperCase();
        const b = Math.random().toString(36).slice(2, 6).toUpperCase();
        return `LASH-${a}-${b}`;
      }

      function App() {
        const [state, setState] = useState(loadState);
        const [view, setView] = useState(state.activeUser ? "home" : "login");

        const t = ui[state.lang];
        const activeLesson = state.course.lessons.find((item) => item.id === activeLessonId) || state.course.lessons[0];

        const update = (patch) => {
          setState((current) => {
            const next = normalizeState({ ...current, ...patch });
            saveState(next);
            return next;
          });
        };

        const setCourse = (course) => update({ course });
        const setLang = (lang) => update({ lang });

        if (view === "admin-login" || (!state.activeUser && view === "admin")) {
          return <AdminLogin state={state} update={update} setView={setView} t={t} />;
        }

        if (!state.activeUser) {
          return <LoginScreen state={state} update={update} setView={setView} t={t} setLang={setLang} />;
        }

        const currentView = view === "login" ? "home" : view;
        const completed = state.completed;
        const done = completed.length;
        const pct = Math.round((done / state.course.lessons.length) * 100);

        return (

            <header className="topbar">

          setCourse({ ...state.course, lessons: state.course.lessons.map((item) => item.id === lesson.id ? lesson : item) });

        const replaceResource = (resource) => {
          setCourse({ ...state.course, resources: state.course.resources.map((item) => item.id === resource.id ? resource : item) });
        };

        const addCode = () => {
          const normalized = newCode.trim().toUpperCase();
          if (!normalized || state.validCodes.includes(normalized)) return;
          update({ validCodes: [normalized, ...state.validCodes] });
          setNewCode(makeCode());

        const deleteCode = (code) => {
          const redeemed = { ...state.redeemed };
          delete redeemed[code];
          update({ validCodes: state.validCodes.filter((item) => item !== code), redeemed });
        };

        const exportData = () => {
          const data = JSON.stringify(state, null, 2);
          navigator.clipboard?.writeText(data);
          alert("Data copied to clipboard.");

          const pasted = prompt("Paste exported JSON");

          try {

            saveState(next);
            window.location.reload();

          saveState(clone(defaultState));
          window.location.reload();

            {tab === "lessons" && (
              <div className="admin-panel">
                <label className="field-label">
                  {t.language}
                  <select className="select" value={state.lang} onChange={(event) => setLang(event.target.value)}>
                    <option value="en">English</option>
                    <option value="ru">Русский</option>
                  </select>
                </label>

                <label className="field-label">
                  {t.lessons}
                  <select className="select" value={selectedLesson?.id} onChange={(event) => setSelectedLessonId(event.target.value)}>
                    {state.course.lessons.map((lesson) => <option key={lesson.id} value={lesson.id}>{lesson.content[state.lang].title}</option>)}
                  </select>
                </label>

                {selectedLesson && <LessonEditor lesson={selectedLesson} lang={state.lang} t={t} replaceLesson={replaceLesson} />}

                <label className="field-label">
                  {t.files}
                  <select className="select" value={selectedResource?.id} onChange={(event) => setSelectedResourceId(event.target.value)}>
                    {state.course.resources.map((resource) => <option key={resource.id} value={resource.id}>{resource.content[state.lang].title}</option>)}
                  </select>
                </label>

                {selectedResource && <ResourceEditor resource={selectedResource} lang={state.lang} t={t} replaceResource={replaceResource} />}
              </div>
            )}

            {tab === "codes" && (
              <div className="admin-panel">
                <div className="card" style={{ padding: 12 }}>
                  <label className="field-label">
                    {t.newCode}
                    <input className="input" value={newCode} onChange={(event) => setNewCode(event.target.value.toUpperCase())} />
                  </label>
                  <div style={{ height: 10 }} />
                  <button className="primary" onClick={addCode}>{t.newCode}</button>
                </div>

                {state.validCodes.map((code) => (
                  <div className="admin-row" key={code}>
                    <div>
                      <strong>{code}</strong>
                      <span>{state.redeemed[code] ? `${t.activated}: ${state.redeemed[code].name}` : t.available}</span>
                    </div>
                    <div className="row-actions">
                      <span className="check">{state.redeemed[code] ? t.used : "NEW"}</span>
                      <button className="danger" onClick={() => deleteCode(code)}>{t.delete}</button>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {tab === "data" && (
              <div className="admin-panel">
                <button className="primary" onClick={exportData}>{t.exportData}</button>
                <button className="secondary" onClick={importData}>{t.importData}</button>
                <button className="danger" onClick={resetDemo}>{t.reset}</button>
                <button className="secondary" onClick={() => update({ adminAuthed: false })}>{t.logout}</button>
              </div>
            )}
          </main>
        );
      }

      function LessonEditor({ lesson, lang, t, replaceLesson }) {
        const content = lesson.content[lang];
        const setContent = (patch) => {
          replaceLesson({ ...lesson, content: { ...lesson.content, [lang]: { ...content, ...patch } } });
        };

        return (
          <div className="card admin-form" style={{ padding: 12 }}>
            <label className="field-label">{t.title}<input className="input" value={content.title} onChange={(event) => setContent({ title: event.target.value })} /></label>
            <label className="field-label">{t.meta}<input className="input" value={content.meta} onChange={(event) => setContent({ meta: event.target.value })} /></label>
            <label className="field-label">{t.note}<textarea className="textarea" value={content.note} onChange={(event) => setContent({ note: event.target.value })} /></label>
            <label className="field-label">{t.steps}<textarea className="textarea" value={content.steps.join("\n")} onChange={(event) => setContent({ steps: event.target.value.split("\n").filter(Boolean) })} /></label>
            <label className="field-label">{t.poster}<input className="input" value={lesson.poster} onChange={(event) => replaceLesson({ ...lesson, poster: event.target.value })} /></label>
          </div>
        );
      }

      function ResourceEditor({ resource, lang, t, replaceResource }) {
        const content = resource.content[lang];
        const setContent = (patch) => {
          replaceResource({ ...resource, content: { ...resource.content, [lang]: { ...content, ...patch } } });
        };

        return (
          <div className="card admin-form" style={{ padding: 12 }}>
            <label className="field-label">{t.resourcesTitle}<input className="input" value={content.title} onChange={(event) => setContent({ title: event.target.value })} /></label>
            <label className="field-label">{t.resourcesText}<textarea className="textarea" value={content.text} onChange={(event) => setContent({ text: event.target.value })} /></label>
          </div>
        );
      }

      if ("serviceWorker" in navigator && location.protocol !== "file:") {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
