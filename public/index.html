<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#05060d" />
    <meta name="description" content="Kozak Alex - coming soon." />
    <title>Kozak Alex | Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; }
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #05060d;
      }
      body {
        display: grid;
        place-items: center;
        color: #fff;
        font-family: Oswald, Impact, sans-serif;
      }
      .center {
        position: relative;
        width: min(1120px, calc(100% - 28px));
        display: grid;
        justify-items: center;
        gap: clamp(22px, 4vh, 44px);
      }
      .bg {
        position: fixed;
        inset: -26px;
        background: url("./assets/kozak-neon-miami-bg.png") center / cover no-repeat;
        filter: blur(7px) saturate(1.14) contrast(1.05);
        transform: scale(1.04);
      }
      .shade {
        position: fixed;
        inset: 0;
        background:
          radial-gradient(circle at 50% 50%, rgba(255,47,163,.18), transparent 24rem),
          radial-gradient(circle at 72% 32%, rgba(32,216,255,.14), transparent 24rem),
          linear-gradient(180deg, rgba(5,6,13,.38), rgba(5,6,13,.64));
      }
      h1 {
        position: relative;
        margin: 0;
        padding: 0 22px;
        font-size: clamp(54px, 12vw, 168px);
        line-height: .9;
        letter-spacing: .08em;
        text-align: center;
        text-transform: uppercase;
        text-shadow:
          0 0 18px rgba(32,216,255,.62),
          0 0 42px rgba(255,47,163,.42),
          0 22px 70px rgba(0,0,0,.58);
      }
      h1 span {
        display: block;
        background: linear-gradient(90deg, #fff, #20d8ff 34%, #ff2fa3 70%, #fff);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .countdown {
        position: relative;
        width: 100%;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: clamp(10px, 2vw, 28px);
      }
      .unit {
        display: grid;
        gap: 14px;
        justify-items: center;
      }
      .value {
        width: 100%;
        display: grid;
        grid-auto-flow: column;
        grid-auto-columns: minmax(0, 1fr);
        gap: clamp(4px, .75vw, 10px);
      }
      .digit {
        position: relative;
        width: 100%;
        aspect-ratio: 1.08 / 1;
        min-height: 128px;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,.16);
        border-radius: clamp(12px, 1.6vw, 22px);
        background:
          linear-gradient(180deg, rgba(255,255,255,.20), rgba(255,255,255,.04) 48%, rgba(0,0,0,.38) 49%, rgba(255,255,255,.06)),
          linear-gradient(135deg, rgba(255,47,163,.18), rgba(32,216,255,.10)),
          rgba(11, 12, 17, .84);
        box-shadow:
          0 24px 60px rgba(0,0,0,.44),
          inset 0 1px 0 rgba(255,255,255,.28),
          inset 0 -14px 26px rgba(0,0,0,.32);
        backdrop-filter: blur(10px) saturate(1.1);
        perspective: 520px;
      }
      .digit::before {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        top: 50%;
        height: 2px;
        background: rgba(0,0,0,.62);
        box-shadow: 0 -1px 0 rgba(255,255,255,.10), 0 1px 0 rgba(255,255,255,.08);
        z-index: 5;
      }
      .digit::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 32% 20%, rgba(255,255,255,.26), transparent 16%),
          linear-gradient(115deg, transparent 0 36%, rgba(255,255,255,.12) 46%, transparent 58%);
        opacity: .42;
        pointer-events: none;
        z-index: 6;
      }
      .digit-num {
        position: absolute;
        left: 0;
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
        font-size: clamp(54px, 9vw, 128px);
        line-height: .8;
        letter-spacing: .02em;
        color: #f5f5f5;
        text-shadow:
          0 2px 0 rgba(255,255,255,.18),
          0 8px 12px rgba(0,0,0,.48);
        font-variant-numeric: tabular-nums;
      }
      .digit-current { inset: 0; z-index: 1; }
      .digit-flap {
        position: absolute;
        left: 0;
        width: 100%;
        height: 50%;
        overflow: hidden;
        backface-visibility: hidden;
        transform-style: preserve-3d;
      }
      .digit-flap .digit-num { height: 200%; }
      .digit-top {
        top: 0;
        z-index: 4;
        transform-origin: center bottom;
        background:
          linear-gradient(180deg, rgba(255,255,255,.20), rgba(255,255,255,.04)),
          rgba(20,20,24,.98);
      }
      .digit-top .digit-num { top: 0; }
      .digit-bottom {
        bottom: 0;
        z-index: 3;
        transform-origin: center top;
        transform: rotateX(90deg);
        background:
          linear-gradient(180deg, rgba(0,0,0,.34), rgba(255,255,255,.06)),
          rgba(13,13,18,.98);
      }
      .digit-bottom .digit-num { bottom: 0; }
      .digit.is-flipping .digit-top { animation: flipTop .34s ease-in forwards; }
      .digit.is-flipping .digit-bottom { animation: flipBottom .34s ease-out .32s forwards; }
      @keyframes flipTop {
        from { transform: rotateX(0); }
        to { transform: rotateX(-90deg); }
      }
      @keyframes flipBottom {
        from { transform: rotateX(90deg); }
        to { transform: rotateX(0); }
      }
      .label {
        color: #d7a529;
        font-family: Arial, sans-serif;
        font-size: clamp(11px, 1.7vw, 20px);
        font-weight: 600;
        letter-spacing: .10em;
        text-transform: uppercase;
        text-shadow: 0 0 16px rgba(255,47,163,.28);
      }
      .date-note {
        color: rgba(255,255,255,.68);
        font-family: Arial, sans-serif;
        font-size: clamp(11px, 1.5vw, 15px);
        font-weight: 700;
        letter-spacing: .12em;
        text-align: center;
        text-transform: uppercase;
        text-shadow: 0 0 16px rgba(32,216,255,.28);
      }
      @media (max-width: 640px) {
        .center { gap: 20px; }
        h1 { font-size: clamp(46px, 16vw, 74px); }
        .countdown { gap: 7px; }
        .unit { gap: 8px; }
        .value { gap: 3px; }
        .digit {
          min-height: 74px;
          border-radius: 11px;
        }
        .digit-num { font-size: clamp(34px, 13vw, 54px); }
        .label {
          font-size: 9px;
          letter-spacing: .04em;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg" aria-hidden="true"></div>
    <div class="shade" aria-hidden="true"></div>
    <main class="center">
      <h1><span>Coming Soon</span></h1>
      <section class="countdown" aria-label="Countdown to November 19, 2026 in Miami">
        <div class="unit">
          <div class="value" id="days" aria-label="Days"></div>
          <div class="label">Days</div>
        </div>
        <div class="unit">
          <div class="value" id="hours" aria-label="Hours"></div>
          <div class="label">Hours</div>
        </div>
        <div class="unit">
          <div class="value" id="minutes" aria-label="Minutes"></div>
          <div class="label">Minutes</div>
        </div>
        <div class="unit">
          <div class="value" id="seconds" aria-label="Seconds"></div>
          <div class="label">Seconds</div>
        </div>
      </section>
      <div class="date-note">November 19, 2026 · Miami time</div>
    </main>
    <script>
      const target = new Date("2026-11-19T00:00:00-05:00").getTime();
      const values = { days: "", hours: "", minutes: "", seconds: "" };
      const pad = (value, size = 2) => String(Math.max(0, value)).padStart(size, "0");
      const digitMarkup = (digit) => `
        <span class="digit-current digit-num">${digit}</span>
        <span class="digit-flap digit-top" aria-hidden="true"><span class="digit-num">${digit}</span></span>
        <span class="digit-flap digit-bottom" aria-hidden="true"><span class="digit-num">${digit}</span></span>
      `;
      const makeDigit = (digit) => {
        const node = document.createElement("span");
        node.className = "digit";
        node.dataset.value = digit;
        node.innerHTML = digitMarkup(digit);
        return node;
      };
      const setValue = (id, value) => {
        const node = document.getElementById(id);
        node.setAttribute("aria-label", `${node.getAttribute("aria-label").split(":")[0]}: ${value}`);
        if (!values[id]) {
          values[id] = value;
          node.replaceChildren(...value.split("").map(makeDigit));
          return;
        }
        if (values[id] === value) return;
        const previous = values[id].padStart(value.length, "0");
        values[id] = value;
        value.split("").forEach((digit, index) => {
          let tile = node.children[index];
          if (!tile) {
            tile = makeDigit(digit);
            node.appendChild(tile);
          }
          if (tile.dataset.value === digit) return;
          const oldDigit = previous[index] || tile.dataset.value || "0";
          tile.classList.remove("is-flipping");
          tile.innerHTML = `
            <span class="digit-current digit-num">${digit}</span>
            <span class="digit-flap digit-top" aria-hidden="true"><span class="digit-num">${oldDigit}</span></span>
            <span class="digit-flap digit-bottom" aria-hidden="true"><span class="digit-num">${digit}</span></span>
          `;
          tile.dataset.value = digit;
          void tile.offsetWidth;
          tile.classList.add("is-flipping");
        });
      };
      const tick = () => {
        const left = Math.max(0, target - Date.now());
        const totalSeconds = Math.floor(left / 1000);
        const days = Math.floor(totalSeconds / 86400);
        const hours = Math.floor((totalSeconds % 86400) / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;
        setValue("days", pad(days, 3));
        setValue("hours", pad(hours));
        setValue("minutes", pad(minutes));
        setValue("seconds", pad(seconds));
      };
      tick();
      setInterval(tick, 1000);
    </script>
  </body>
</html>
