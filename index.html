<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#e94d7b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Miami Lash Course" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./assets/girls-miami.png" />
    <title>Miami Lash Course | Hanna Kozak</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Great+Vibes&family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      :root { --pink:#e94d7b; --pink-dark:#c93662; --pink-soft:#ffd6df; --cream:#fff1ec; --ink:#1d1d1d; }
      * { box-sizing: border-box; }
      html { min-height: 100%; background: #25151c; }
      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: Montserrat, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        background:
          linear-gradient(115deg, rgba(255,214,223,.94), rgba(255,241,236,.78) 44%, rgba(233,77,123,.32)),
          url("https://images.unsplash.com/photo-1506929562872-bb421503ef21?auto=format&fit=crop&w=1800&q=85") center / cover fixed;
      }
      button, input, textarea, select { font: inherit; }
      button { cursor: pointer; }
      img { display: block; max-width: 100%; }
      .app-shell {
        width: min(100%, 430px);
        min-height: 100vh;
        margin: 0 auto;
        background:
          radial-gradient(circle at 18% 8%, rgba(255,255,255,.92), transparent 12rem),
          linear-gradient(180deg, rgba(255,241,236,.97), rgba(255,214,223,.96) 48%, rgba(255,241,236,.98));
        box-shadow: 0 0 70px rgba(36,10,22,.42);
        overflow: hidden;
        position: relative;
      }
      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: calc(14px + env(safe-area-inset-top)) 16px 12px;
        background: rgba(255,241,236,.84);
        border-bottom: 1px solid rgba(233,77,123,.18);
        backdrop-filter: blur(18px);
      }
      .brand { border: 0; background: transparent; padding: 0; text-align: left; }
      .brand span { display: block; font-size: 10px; font-weight: 800; text-transform: uppercase; color: rgba(29,29,29,.62); }
      .brand strong { display: block; color: var(--pink); font-size: 18px; font-weight: 900; text-transform: uppercase; }
      .top-actions { display: flex; align-items: center; gap: 8px; }
      .icon-button {
        min-width: 42px;
        height: 42px;
        border: 1px solid rgba(233,77,123,.18);
        border-radius: 999px;
        padding: 0 12px;
        background: rgba(255,255,255,.76);
        color: var(--pink-dark);
        font-size: 11px;
        font-weight: 900;
        box-shadow: 0 10px 24px rgba(201,54,98,.14);
      }
      .screen { padding: 18px 16px 98px; }
      .hero {
        min-height: 100vh;
        padding: calc(20px + env(safe-area-inset-top)) 20px calc(28px + env(safe-area-inset-bottom));
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .hero-title {
        margin: 12px 0 0;
        color: var(--pink);
        font-family: "Bebas Neue", Impact, sans-serif;
        font-size: clamp(78px, 22vw, 116px);
        line-height: .78;
        text-transform: uppercase;
      }
      .script {
        color: #fff;
        font-family: "Great Vibes", cursive;
        font-size: .66em;
        font-weight: 400;
        text-transform: none;
        text-shadow: 0 0 5px #fff, 0 0 16px #ff6aa0, 0 0 34px var(--pink);
      }
      .eyebrow { font-size: 11px; font-weight: 900; text-transform: uppercase; color: rgba(29,29,29,.72); }
      .polaroid-stack { position: relative; min-height: 340px; margin-top: 20px; }
      .polaroid { position: absolute; background: #fff; padding: 8px 8px 36px; box-shadow: 0 24px 44px rgba(29,29,29,.22); }
      .polaroid.main { right: -16px; top: 0; width: 78%; transform: rotate(6deg); }
      .polaroid.small { left: -8px; bottom: 18px; width: 58%; transform: rotate(-8deg); }
      .polaroid img { width: 100%; height: 210px; object-fit: cover; }
      .polaroid.small img { height: 145px; }
      .paper-note {
        position: absolute;
        right: 12px;
        bottom: 0;
        width: 188px;
        padding: 18px 16px;
        background: #fff8f4;
        transform: rotate(-4deg);
        box-shadow: 0 18px 32px rgba(201,54,98,.18);
        clip-path: polygon(2% 5%, 98% 0, 96% 95%, 5% 100%);
      }
      .paper-note p { margin: 0; font-size: 11px; font-weight: 900; text-transform: uppercase; line-height: 1.8; }
      .login-card {
        border: 1px solid rgba(255,255,255,.7);
        border-radius: 28px;
        padding: 16px;
        background: rgba(255,255,255,.7);
        box-shadow: 0 24px 60px rgba(201,54,98,.23);
        backdrop-filter: blur(18px);
      }
      .input, .textarea, .select {
        width: 100%;
        border: 1px solid rgba(233,77,123,.28);
        border-radius: 14px;
        background: rgba(255,255,255,.9);
        color: var(--ink);
        font-size: 13px;
        font-weight: 800;
        outline: 0;
      }
      .input, .select { min-height: 48px; padding: 0 13px; }
      .textarea { min-height: 92px; padding: 12px 13px; resize: vertical; line-height: 1.55; }
      .primary, .secondary, .danger {
        min-height: 48px;
        border-radius: 14px;
        padding: 0 15px;
        font-size: 11px;
        font-weight: 900;
        text-transform: uppercase;
      }
      .primary { width: 100%; border: 0; background: var(--pink); color: #fff; box-shadow: 0 0 18px rgba(233,77,123,.52), 0 16px 32px rgba(201,54,98,.26); }
      .secondary { border: 1px solid rgba(233,77,123,.2); background: rgba(255,255,255,.76); color: var(--ink); }
      .danger { border: 1px solid rgba(201,54,98,.32); background: rgba(201,54,98,.1); color: var(--pink-dark); }
      .error { margin: 10px 0 0; color: var(--pink-dark); font-size: 12px; font-weight: 800; }
      .tabbar {
        position: fixed;
        left: 50%;
        bottom: 0;
        z-index: 30;
        width: min(100%, 430px);
        transform: translateX(-50%);
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
        background: rgba(255,241,236,.92);
        border-top: 1px solid rgba(233,77,123,.16);
        backdrop-filter: blur(18px);
      }
      .tabbar button { min-height: 54px; border: 0; border-radius: 18px; background: transparent; color: rgba(29,29,29,.55); font-size: 10px; font-weight: 900; text-transform: uppercase; }
      .tabbar button.active { background: rgba(233,77,123,.12); color: var(--pink-dark); }
      .section-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
      .section-head h1, .section-head h2 { margin: 0; color: var(--pink); font-family: "Bebas Neue", Impact, sans-serif; font-size: 44px; line-height: .9; text-transform: uppercase; }
      .section-head p { margin: 4px 0 0; font-size: 12px; font-weight: 800; color: rgba(29,29,29,.58); }
      .card { border: 1px solid rgba(233,77,123,.15); border-radius: 8px; background: rgba(255,255,255,.72); box-shadow: 0 14px 32px rgba(201,54,98,.12); overflow: hidden; }
      .course-hero {
        min-height: 250px;
        padding: 18px;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        color: #fff;
        background: linear-gradient(180deg, rgba(29,29,29,.08), rgba(29,29,29,.76)), url("./assets/girls-miami.png") center 20% / cover;
      }
      .course-hero h1 { margin: 0; font-family: "Bebas Neue", Impact, sans-serif; font-size: 58px; line-height: .82; text-transform: uppercase; }
      .course-hero p { margin: 8px 0 0; font-size: 12px; font-weight: 800; }
      .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 12px; }
      .stat { border-radius: 8px; padding: 12px 10px; background: rgba(255,255,255,.72); }
      .stat strong { display: block; color: var(--pink-dark); font-size: 19px; font-weight: 900; }
      .stat span { font-size: 10px; font-weight: 900; text-transform: uppercase; color: rgba(29,29,29,.58); }
      .progress-ring { width: 74px; height: 74px; display: grid; place-items: center; border-radius: 999px; background: conic-gradient(var(--pink) var(--pct), rgba(233,77,123,.14) 0); }
      .progress-ring span { width: 58px; height: 58px; display: grid; place-items: center; border-radius: 999px; background: var(--cream); font-size: 14px; font-weight: 900; }
      .lesson-list { display: grid; gap: 12px; }
      .lesson-card { width: 100%; display: grid; grid-template-columns: 84px 1fr 34px; gap: 12px; align-items: center; border: 1px solid rgba(233,77,123,.14); border-radius: 8px; padding: 10px; background: rgba(255,255,255,.74); text-align: left; }
      .lesson-thumb { height: 72px; width: 84px; border-radius: 7px; object-fit: cover; background: var(--pink-soft); }
      .lesson-card h3 { margin: 0; font-size: 14px; line-height: 1.2; text-transform: uppercase; }
      .lesson-card p { margin: 5px 0 0; color: rgba(29,29,29,.62); font-size: 11px; font-weight: 700; line-height: 1.4; }
      .check { width: 30px; height: 30px; display: grid; place-items: center; border-radius: 999px; background: rgba(233,77,123,.12); color: var(--pink-dark); font-size: 10px; font-weight: 900; }
      .video-box { position: relative; min-height: 226px; border-radius: 8px; overflow: hidden; background: linear-gradient(180deg, rgba(29,29,29,.08), rgba(29,29,29,.82)), var(--poster) center / cover; display: flex; align-items: center; justify-content: center; }
      .play { width: 76px; height: 76px; border: 2px solid rgba(255,255,255,.7); border-radius: 999px; background: rgba(233,77,123,.74); color: #fff; font-size: 28px; box-shadow: 0 0 28px rgba(233,77,123,.65); }
      .watermark { position: absolute; inset: 0; display: grid; grid-template-columns: repeat(2, 1fr); opacity: .28; pointer-events: none; transform: rotate(-24deg) scale(1.18); }
      .watermark span { align-self: center; justify-self: center; color: #fff; font-size: 11px; font-weight: 900; text-shadow: 0 1px 3px rgba(0,0,0,.45); }
      .lesson-body { padding: 16px 0 0; }
      .lesson-body h1 { margin: 16px 0 6px; font-family: "Bebas Neue", Impact, sans-serif; color: var(--pink); font-size: 48px; line-height: .88; text-transform: uppercase; }
      .lesson-body p, .lesson-body li { font-size: 13px; font-weight: 650; line-height: 1.7; }
      .steps { padding: 0; margin: 14px 0; list-style: none; display: grid; gap: 10px; }
      .steps li { border-radius: 8px; padding: 12px; background: rgba(255,255,255,.7); }
      .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      .resource { min-height: 126px; padding: 14px; border: 1px solid rgba(233,77,123,.14); border-radius: 8px; background: rgba(255,255,255,.72); }
      .resource strong { display: block; color: var(--pink-dark); font-size: 13px; text-transform: uppercase; }
      .resource span { display: block; margin-top: 7px; font-size: 11px; font-weight: 700; line-height: 1.45; }
      .admin-form, .admin-panel { display: grid; gap: 10px; }
      .admin-tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
      .admin-tabs button { min-height: 42px; border: 1px solid rgba(233,77,123,.18); border-radius: 12px; background: rgba(255,255,255,.7); font-size: 10px; font-weight: 900; text-transform: uppercase; }
      .admin-tabs button.active { background: rgba(233,77,123,.14); color: var(--pink-dark); }
      .field-label { display: grid; gap: 5px; font-size: 10px; font-weight: 900; text-transform: uppercase; color: rgba(29,29,29,.62); }
      .notice { border-radius: 8px; padding: 12px; background: rgba(216,162,74,.16); font-size: 11px; font-weight: 800; line-height: 1.55; }
      .admin-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 12px; border-radius: 8px; background: rgba(255,255,255,.72); }
      .admin-row strong { display: block; font-size: 13px; }
      .admin-row span { font-size: 10px; font-weight: 900; color: rgba(29,29,29,.55); text-transform: uppercase; }
      .row-actions { display: flex; gap: 8px; flex-wrap: wrap; }
      @media (min-width: 800px) {
        body { padding: 26px 0; }
        .app-shell { min-height: calc(100vh - 52px); border: 10px solid rgba(255,255,255,.58); border-radius: 46px; }
        .topbar { border-radius: 36px 36px 0 0; }
        .tabbar { bottom: 26px; border-radius: 0 0 36px 36px; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useEffect, useMemo, useState } = React;
      const API = "";
      const CLIENT_KEY = "miami-lash-secure-client-v1";

      const ui = {
        en: {
          studentName: "Student name", accessCode: "Access code", unlock: "Unlock Course", demoCode: "Demo code",
          admin: "Admin", adminLogin: "Admin Login", password: "Password", login: "Login", logout: "Logout",
          home: "Home", lessons: "Lessons", files: "Files", settings: "Settings", premiumTraining: "Premium Online Training",
          statsLessons: "Lessons", statsDone: "Done", statsProgress: "Progress", continueTraining: "Continue Training",
          openLesson: "Open Lesson", today: "Today", practicePlan: "Practice plan", markComplete: "Mark Complete",
          completed: "Lesson Completed", resources: "Student resources", courseModules: "Online course modules",
          language: "Language", editContent: "Edit Content", accessCodes: "Access Codes", data: "Data",
          newCode: "New Code", available: "Available", activated: "Activated", used: "Used", delete: "Delete",
          save: "Save", title: "Title", meta: "Meta", note: "Description", steps: "Steps, one per line",
          poster: "Poster URL", resourcesTitle: "Resource title", resourcesText: "Resource text",
          adminNotice: "Course data and access codes are now checked by the server. For stronger protection, keep this repository private and deploy the Node server with environment variables.",
          todayOne: "Practice clean isolation on sponge or mannequin before client work.",
          todayTwo: "Take close-up shots after every finished set to track direction and symmetry.",
          loading: "Loading...", serverError: "Server is not available. Run npm start or deploy the backend.",
          wrong: "Access denied. Check the code or password.", codeCopied: "Code created."
        },
        ru: {
          studentName: "Имя ученицы", accessCode: "Код доступа", unlock: "Открыть курс", demoCode: "Демо-код",
          admin: "Админ", adminLogin: "Вход в админку", password: "Пароль", login: "Войти", logout: "Выйти",
          home: "Главная", lessons: "Уроки", files: "Файлы", settings: "Настройки", premiumTraining: "Премиум онлайн-обучение",
          statsLessons: "Уроков", statsDone: "Пройдено", statsProgress: "Прогресс", continueTraining: "Продолжить обучение",
          openLesson: "Открыть урок", today: "Сегодня", practicePlan: "План практики", markComplete: "Отметить пройденным",
          completed: "Урок пройден", resources: "Материалы ученицы", courseModules: "Модули онлайн-курса",
          language: "Язык", editContent: "Редактировать", accessCodes: "Коды доступа", data: "Данные",
          newCode: "Новый код", available: "Свободен", activated: "Активирован", used: "Использован", delete: "Удалить",
          save: "Сохранить", title: "Название", meta: "Инфо", note: "Описание", steps: "Шаги, каждый с новой строки",
          poster: "Ссылка на обложку", resourcesTitle: "Название материала", resourcesText: "Текст материала",
          adminNotice: "Материалы курса и коды теперь проверяются сервером. Для более сильной защиты держите репозиторий приватным и деплойте Node server с переменными окружения.",
          todayOne: "Отработайте чистую изоляцию на спонже или манекене перед работой с клиентом.",
          todayTwo: "Делайте крупные фото после каждого сета, чтобы отслеживать направление и симметрию.",
          loading: "Загрузка...", serverError: "Сервер недоступен. Запустите npm start или задеплойте backend.",
          wrong: "Доступ запрещен. Проверьте код или пароль.", codeCopied: "Код создан."
        }
      };

      function getClient() {
        const stored = JSON.parse(localStorage.getItem(CLIENT_KEY) || "{}");
        if (!stored.deviceId) stored.deviceId = crypto.randomUUID ? crypto.randomUUID() : String(Date.now());
        if (!stored.lang) stored.lang = "en";
        localStorage.setItem(CLIENT_KEY, JSON.stringify(stored));
        return stored;
      }

      function saveClient(patch) {
        const next = { ...getClient(), ...patch };
        localStorage.setItem(CLIENT_KEY, JSON.stringify(next));
        return next;
      }

      async function request(path, options = {}) {
        const headers = { "Content-Type": "application/json", ...(options.headers || {}) };
        const response = await fetch(`${API}${path}`, { ...options, headers });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || "Request failed");
        return data;
      }

      function App() {
        const [client, setClient] = useState(getClient);
        const [course, setCourse] = useState(null);
        const [user, setUser] = useState(client.user || null);
        const [admin, setAdmin] = useState(Boolean(client.adminToken));
        const [view, setView] = useState(client.token ? "home" : "login");
        const [activeLessonId, setActiveLessonId] = useState("");
        const [loading, setLoading] = useState(Boolean(client.token));
        const [error, setError] = useState("");
        const lang = client.lang || "en";
        const t = ui[lang];

        const refreshCourse = async () => {
          if (!client.token) return;
          setLoading(true);
          setError("");
          try {
            const data = await request("/api/course", { headers: { Authorization: `Bearer ${client.token}` } });
            setCourse(data.course);
            setUser(data.user);
            setActiveLessonId(data.course.lessons[0]?.id || "");
          } catch (err) {
            setError(t.serverError);
            setClient(saveClient({ token: null, user: null }));
            setView("login");
          } finally {
            setLoading(false);
          }
        };

        useEffect(() => { refreshCourse(); }, []);

        const setLang = (nextLang) => setClient(saveClient({ lang: nextLang }));
        const signOut = () => {
          setClient(saveClient({ token: null, user: null, adminToken: null }));
          setUser(null);
          setCourse(null);
          setAdmin(false);
          setView("login");
        };

        if (loading) return <Shell><main className="screen"><p className="notice">{t.loading}</p></main></Shell>;
        if (!client.token && view !== "admin-login") return <LoginScreen t={t} lang={lang} setLang={setLang} setClient={setClient} setCourse={setCourse} setUser={setUser} setView={setView} />;
        if (view === "admin-login") return <AdminLogin t={t} lang={lang} setLang={setLang} setClient={setClient} setAdmin={setAdmin} setView={setView} />;
        if (!course) return <Shell><main className="screen"><p className="notice">{error || t.serverError}</p><button className="primary" onClick={refreshCourse}>{t.loading}</button></main></Shell>;

        const activeLesson = course.lessons.find((lesson) => lesson.id === activeLessonId) || course.lessons[0];
        const currentView = view === "login" ? "home" : view;

        return (
          <Shell course={course} lang={lang} setLang={setLang} signOut={signOut}>
            {currentView === "home" && <HomeScreen course={course} t={t} lang={lang} user={user} setView={setView} setActiveLessonId={setActiveLessonId} />}
            {currentView === "lessons" && <LessonsScreen course={course} t={t} lang={lang} user={user} setView={setView} setActiveLessonId={setActiveLessonId} />}
            {currentView === "lesson" && <LessonScreen course={course} t={t} lang={lang} user={user} lesson={activeLesson} setUser={setUser} token={client.token} />}
            {currentView === "resources" && <ResourcesScreen course={course} t={t} lang={lang} />}
            {currentView === "admin" && admin && <AdminScreen t={t} lang={lang} setLang={setLang} client={client} course={course} setCourse={setCourse} />}
            {currentView === "admin" && !admin && <AdminLogin t={t} lang={lang} setLang={setLang} setClient={setClient} setAdmin={setAdmin} setView={setView} />}
            <nav className="tabbar">
              {[["home", t.home], ["lessons", t.lessons], ["resources", t.files], ["admin", t.admin]].map(([id, label]) => (
                <button key={id} className={currentView === id ? "active" : ""} onClick={() => setView(id)}>{label}</button>
              ))}
            </nav>
          </Shell>
        );
      }

      function Shell({ children, course, lang, setLang, signOut }) {
        return (
          <div className="app-shell">
            {course && (
              <header className="topbar">
                <button className="brand"><span>{course.settings.eyebrow}</span><strong>{course.settings.brand}</strong></button>
                <div className="top-actions">
                  <button className="icon-button" onClick={() => setLang(lang === "en" ? "ru" : "en")}>{lang.toUpperCase()}</button>
                  {signOut && <button className="icon-button" onClick={signOut}>HK</button>}
                </div>
              </header>
            )}
            {children}
          </div>
        );
      }

      function LoginScreen({ t, lang, setLang, setClient, setCourse, setUser, setView }) {
        const [name, setName] = useState("");
        const [code, setCode] = useState("");
        const [error, setError] = useState("");
        const submit = async (event) => {
          event.preventDefault();
          setError("");
          try {
            const current = getClient();
            const data = await request("/api/redeem", {
              method: "POST",
              body: JSON.stringify({ name, code, deviceId: current.deviceId })
            });
            setClient(saveClient({ token: data.token, user: data.user }));
            setUser(data.user);
            setCourse(data.course);
            setView("home");
          } catch (err) {
            setError(err.message || t.wrong);
          }
        };
        return (
          <div className="app-shell">
            <main className="hero">
              <div>
                <div className="top-actions" style={{ justifyContent: "space-between" }}>
                  <p className="eyebrow">Lash Artist | Hanna Kozak</p>
                  <button className="icon-button" onClick={() => setLang(lang === "en" ? "ru" : "en")}>{lang.toUpperCase()}</button>
                </div>
                <h1 className="hero-title">Girls<br /><span className="script">Miami</span></h1>
                <div className="polaroid-stack">
                  <div className="polaroid main"><img src="./assets/girls-miami.png" alt="Girls Miami lash course" /></div>
                  <div className="polaroid small"><img src="./assets/premium-lash-supplies.png" alt="Miami lash supplies poster" /></div>
                  <div className="paper-note"><p>Premium quality</p><p>Long lasting</p><p>Comfort and care</p></div>
                </div>
              </div>
              <form className="login-card" onSubmit={submit}>
                <input className="input" value={name} onChange={(e) => setName(e.target.value)} placeholder={t.studentName} required />
                <div style={{ height: 10 }} />
                <input className="input" value={code} onChange={(e) => setCode(e.target.value)} placeholder={t.accessCode} required autoCapitalize="characters" />
                {error && <p className="error">{error}</p>}
                <div style={{ height: 12 }} />
                <button className="primary">{t.unlock}</button>
                <div style={{ height: 10 }} />
                <button type="button" className="secondary" style={{ width: "100%" }} onClick={() => setView("admin-login")}>{t.adminLogin}</button>
                <p style={{ margin: "12px 0 0", fontSize: 11, fontWeight: 800, color: "rgba(29,29,29,.55)", lineHeight: 1.5 }}>{t.demoCode}: LASH-MIAMI-2026</p>
              </form>
            </main>
          </div>
        );
      }

      function AdminLogin({ t, lang, setLang, setClient, setAdmin, setView }) {
        const [password, setPassword] = useState("");
        const [error, setError] = useState("");
        const submit = async (event) => {
          event.preventDefault();
          setError("");
          try {
            const data = await request("/api/admin/login", { method: "POST", body: JSON.stringify({ password }) });
            setClient(saveClient({ adminToken: data.token }));
            setAdmin(true);
            setView("admin");
          } catch (err) {
            setError(t.wrong);
          }
        };
        return (
          <div className="app-shell">
            <main className="hero">
              <div>
                <div className="top-actions" style={{ justifyContent: "space-between" }}>
                  <p className="eyebrow">Lash Artist | Hanna Kozak</p>
                  <button className="icon-button" onClick={() => setLang(lang === "en" ? "ru" : "en")}>{lang.toUpperCase()}</button>
                </div>
                <h1 className="hero-title">{t.admin}<br /><span className="script">Miami</span></h1>
              </div>
              <form className="login-card" onSubmit={submit}>
                <h2 style={{ margin: "0 0 12px", color: "var(--pink)", fontFamily: "Bebas Neue", fontSize: 40 }}>{t.adminLogin}</h2>
                <input className="input" type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder={t.password} required />
                {error && <p className="error">{error}</p>}
                <div style={{ height: 12 }} />
                <button className="primary">{t.login}</button>
                <div style={{ height: 10 }} />
                <button className="secondary" type="button" style={{ width: "100%" }} onClick={() => setView("login")}>Back</button>
              </form>
            </main>
          </div>
        );
      }

      function HomeScreen({ course, t, lang, user, setView, setActiveLessonId }) {
        const hero = course.settings.hero[lang];
        const done = user.completed.length;
        const pct = Math.round((done / course.lessons.length) * 100);
        const nextLesson = course.lessons.find((lesson) => !user.completed.includes(lesson.id)) || course.lessons[0];
        const content = nextLesson.content[lang];
        return (
          <main className="screen">
            <section className="course-hero card"><p className="eyebrow" style={{ color: "rgba(255,255,255,.82)" }}>{t.premiumTraining}</p><h1>{hero.title}<br /><span className="script">{hero.script}</span></h1><p>{hero.subtitle}</p></section>
            <div className="stats"><div className="stat"><strong>{course.lessons.length}</strong><span>{t.statsLessons}</span></div><div className="stat"><strong>{done}</strong><span>{t.statsDone}</span></div><div className="stat"><strong>{pct}%</strong><span>{t.statsProgress}</span></div></div>
            <section style={{ marginTop: 22 }} className="card">
              <div style={{ padding: 16, display: "grid", gridTemplateColumns: "1fr 74px", gap: 14, alignItems: "center" }}>
                <div><p className="eyebrow">{t.continueTraining}</p><h2 style={{ margin: "4px 0 8px", fontSize: 22, textTransform: "uppercase" }}>{content.title}</h2><p style={{ margin: 0, fontSize: 12, fontWeight: 700, lineHeight: 1.55 }}>{content.meta}</p></div>
                <div className="progress-ring" style={{ "--pct": `${pct}%` }}><span>{pct}%</span></div>
              </div>
              <div style={{ padding: "0 16px 16px" }}><button className="primary" onClick={() => { setActiveLessonId(nextLesson.id); setView("lesson"); }}>{t.openLesson}</button></div>
            </section>
            <section style={{ marginTop: 22 }}><div className="section-head"><div><h2>{t.today}</h2><p>{t.practicePlan}</p></div></div><div className="grid-2"><div className="resource"><strong>30 min</strong><span>{t.todayOne}</span></div><div className="resource"><strong>Photo</strong><span>{t.todayTwo}</span></div></div></section>
          </main>
        );
      }

      function LessonsScreen({ course, t, lang, user, setActiveLessonId, setView }) {
        return <main className="screen"><div className="section-head"><div><h1>{t.lessons}</h1><p>{t.courseModules}</p></div></div><div className="lesson-list">{course.lessons.map((lesson, index) => {
          const content = lesson.content[lang];
          return <button className="lesson-card" key={lesson.id} onClick={() => { setActiveLessonId(lesson.id); setView("lesson"); }}><img className="lesson-thumb" src={lesson.poster} alt={content.title} /><div><h3>{String(index + 1).padStart(2, "0")} · {content.title}</h3><p>{content.meta}</p></div><span className="check">{user.completed.includes(lesson.id) ? "OK" : "GO"}</span></button>;
        })}</div></main>;
      }

      function LessonScreen({ t, lang, user, lesson, setUser, token }) {
        const content = lesson.content[lang];
        const isDone = user.completed.includes(lesson.id);
        const markDone = async () => {
          if (isDone) return;
          const completed = [...user.completed, lesson.id];
          await request("/api/progress", { method: "POST", headers: { Authorization: `Bearer ${token}` }, body: JSON.stringify({ completed }) });
          setUser({ ...user, completed });
        };
        return (
          <main className="screen">
            <div className="video-box" style={{ "--poster": `url(${lesson.poster})` }}><button className="play">▶</button><div className="watermark">{Array.from({ length: 8 }).map((_, index) => <span key={index}>{user.name} · {user.code}</span>)}</div></div>
            <div className="lesson-body"><p className="eyebrow">{content.meta}</p><h1>{content.title}</h1><p>{content.note}</p><ul className="steps">{content.steps.map((step, index) => <li key={`${step}-${index}`}><strong>{index + 1}.</strong> {step}</li>)}</ul><button className="primary" onClick={markDone}>{isDone ? t.completed : t.markComplete}</button></div>
          </main>
        );
      }

      function ResourcesScreen({ course, t, lang }) {
        return <main className="screen"><div className="section-head"><div><h1>{t.files}</h1><p>{t.resources}</p></div></div><div className="grid-2">{course.resources.map((resource) => {
          const content = resource.content[lang];
          return <div className="resource" key={resource.id}><strong>{content.title}</strong><span>{content.text}</span></div>;
        })}</div><section className="card" style={{ marginTop: 18, padding: 16 }}><p className="eyebrow">Premium Supplies</p><h2 style={{ margin: "4px 0 8px", color: "var(--pink)", fontFamily: "Bebas Neue", fontSize: 42, lineHeight: .9 }}>Unova Lashes</h2><p style={{ margin: 0, fontSize: 13, fontWeight: 700, lineHeight: 1.7 }}>{lang === "en" ? "Professional lash materials imported from Korea, fresh stock updates and delivery across Miami." : "Профессиональные материалы из Кореи, свежее наличие и доставка по Майами."}</p></section></main>;
      }

      function AdminScreen({ t, lang, setLang, client, course, setCourse }) {
        const [tab, setTab] = useState("lessons");
        const [adminState, setAdminState] = useState(null);
        const [selectedLessonId, setSelectedLessonId] = useState(course.lessons[0]?.id);
        const [selectedResourceId, setSelectedResourceId] = useState(course.resources[0]?.id);
        const [newCode, setNewCode] = useState("");
        const adminHeaders = { Authorization: `Bearer ${client.adminToken}` };
        const loadAdmin = async () => setAdminState(await request("/api/admin/state", { headers: adminHeaders }));
        useEffect(() => { loadAdmin(); }, []);
        const saveCourse = async (nextCourse) => {
          const data = await request("/api/admin/course", { method: "PUT", headers: adminHeaders, body: JSON.stringify({ course: nextCourse }) });
          setCourse(data.course);
        };
        const createCode = async () => {
          const data = await request("/api/admin/codes", { method: "POST", headers: adminHeaders, body: JSON.stringify({ code: newCode || undefined }) });
          setNewCode("");
          setAdminState(data);
        };
        const deleteCode = async (code) => setAdminState(await request(`/api/admin/codes/${encodeURIComponent(code)}`, { method: "DELETE", headers: adminHeaders }));
        const selectedLesson = course.lessons.find((lesson) => lesson.id === selectedLessonId) || course.lessons[0];
        const selectedResource = course.resources.find((resource) => resource.id === selectedResourceId) || course.resources[0];
        const replaceLesson = (lesson) => saveCourse({ ...course, lessons: course.lessons.map((item) => item.id === lesson.id ? lesson : item) });
        const replaceResource = (resource) => saveCourse({ ...course, resources: course.resources.map((item) => item.id === resource.id ? resource : item) });
        return (
          <main className="screen">
            <div className="section-head"><div><h1>{t.admin}</h1><p>{t.settings}</p></div><button className="icon-button" onClick={() => setLang(lang === "en" ? "ru" : "en")}>{lang.toUpperCase()}</button></div>
            <p className="notice">{t.adminNotice}</p>
            <div className="admin-tabs"><button className={tab === "lessons" ? "active" : ""} onClick={() => setTab("lessons")}>{t.editContent}</button><button className={tab === "codes" ? "active" : ""} onClick={() => setTab("codes")}>{t.accessCodes}</button><button className={tab === "data" ? "active" : ""} onClick={() => setTab("data")}>{t.data}</button></div>
            {tab === "lessons" && <div className="admin-panel"><label className="field-label">{t.language}<select className="select" value={lang} onChange={(e) => setLang(e.target.value)}><option value="en">English</option><option value="ru">Русский</option></select></label><label className="field-label">{t.lessons}<select className="select" value={selectedLesson?.id} onChange={(e) => setSelectedLessonId(e.target.value)}>{course.lessons.map((lesson) => <option key={lesson.id} value={lesson.id}>{lesson.content[lang].title}</option>)}</select></label>{selectedLesson && <LessonEditor lesson={selectedLesson} lang={lang} t={t} replaceLesson={replaceLesson} />}<label className="field-label">{t.files}<select className="select" value={selectedResource?.id} onChange={(e) => setSelectedResourceId(e.target.value)}>{course.resources.map((resource) => <option key={resource.id} value={resource.id}>{resource.content[lang].title}</option>)}</select></label>{selectedResource && <ResourceEditor resource={selectedResource} lang={lang} t={t} replaceResource={replaceResource} />}</div>}
            {tab === "codes" && <div className="admin-panel"><div className="card" style={{ padding: 12 }}><label className="field-label">{t.newCode}<input className="input" value={newCode} onChange={(e) => setNewCode(e.target.value.toUpperCase())} placeholder="Auto if empty" /></label><div style={{ height: 10 }} /><button className="primary" onClick={createCode}>{t.newCode}</button></div>{(adminState?.codes || []).map((item) => <div className="admin-row" key={item.code}><div><strong>{item.code}</strong><span>{item.redeemed ? `${t.activated}: ${item.studentName}` : t.available}</span></div><div className="row-actions"><span className="check">{item.redeemed ? t.used : "NEW"}</span><button className="danger" onClick={() => deleteCode(item.code)}>{t.delete}</button></div></div>)}</div>}
            {tab === "data" && <div className="admin-panel"><button className="secondary" onClick={loadAdmin}>Refresh</button><p className="notice">Server mode is active. Codes and course edits are stored in <code>data/store.json</code> on the server.</p></div>}
          </main>
        );
      }

      function LessonEditor({ lesson, lang, t, replaceLesson }) {
        const content = lesson.content[lang];
        const setContent = (patch) => replaceLesson({ ...lesson, content: { ...lesson.content, [lang]: { ...content, ...patch } } });
        return <div className="card admin-form" style={{ padding: 12 }}><label className="field-label">{t.title}<input className="input" value={content.title} onChange={(e) => setContent({ title: e.target.value })} /></label><label className="field-label">{t.meta}<input className="input" value={content.meta} onChange={(e) => setContent({ meta: e.target.value })} /></label><label className="field-label">{t.note}<textarea className="textarea" value={content.note} onChange={(e) => setContent({ note: e.target.value })} /></label><label className="field-label">{t.steps}<textarea className="textarea" value={content.steps.join("\\n")} onChange={(e) => setContent({ steps: e.target.value.split("\\n").filter(Boolean) })} /></label><label className="field-label">{t.poster}<input className="input" value={lesson.poster} onChange={(e) => replaceLesson({ ...lesson, poster: e.target.value })} /></label></div>;
      }

      function ResourceEditor({ resource, lang, t, replaceResource }) {
        const content = resource.content[lang];
        const setContent = (patch) => replaceResource({ ...resource, content: { ...resource.content, [lang]: { ...content, ...patch } } });
        return <div className="card admin-form" style={{ padding: 12 }}><label className="field-label">{t.resourcesTitle}<input className="input" value={content.title} onChange={(e) => setContent({ title: e.target.value })} /></label><label className="field-label">{t.resourcesText}<textarea className="textarea" value={content.text} onChange={(e) => setContent({ text: e.target.value })} /></label></div>;
      }

      if ("serviceWorker" in navigator && location.protocol !== "file:") navigator.serviceWorker.register("./sw.js").catch(() => {});
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
