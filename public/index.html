<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#e94d7b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Miami Lash Course" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./assets/girls-miami.png" />
    <title>Miami Lash Course | Hanna Kozak</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Great+Vibes&family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      :root { --pink:#e94d7b; --pink-dark:#c93662; --pink-soft:#ffd6df; --cream:#fff1ec; --ink:#1d1d1d; }
      * { box-sizing: border-box; }
      html { min-height: 100%; background: #25151c; }
      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: Montserrat, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        background:
          linear-gradient(115deg, rgba(255,214,223,.94), rgba(255,241,236,.78) 44%, rgba(233,77,123,.32)),
          url("https://images.unsplash.com/photo-1506929562872-bb421503ef21?auto=format&fit=crop&w=1800&q=85") center / cover fixed;
      }
      button, input, textarea, select { font: inherit; }
      button { cursor: pointer; }
      img { display: block; max-width: 100%; }
      .app-shell {
        width: min(100%, 430px);
        min-height: 100vh;
        margin: 0 auto;
        background:
          radial-gradient(circle at 18% 8%, rgba(255,255,255,.92), transparent 12rem),
          linear-gradient(180deg, rgba(255,241,236,.97), rgba(255,214,223,.96) 48%, rgba(255,241,236,.98));
        box-shadow: 0 0 70px rgba(36,10,22,.42);
        overflow: hidden;
        position: relative;
      }
      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: calc(14px + env(safe-area-inset-top)) 16px 12px;
        background: rgba(255,241,236,.84);
        border-bottom: 1px solid rgba(233,77,123,.18);
        backdrop-filter: blur(18px);
      }
      .brand { border: 0; background: transparent; padding: 0; text-align: left; }
      .brand span { display: block; font-size: 10px; font-weight: 800; text-transform: uppercase; color: rgba(29,29,29,.62); }
      .brand strong { display: block; color: var(--pink); font-size: 18px; font-weight: 900; text-transform: uppercase; }
      .top-actions { display: flex; align-items: center; gap: 8px; }
      .icon-button {
        min-width: 42px;
        height: 42px;
        border: 1px solid rgba(233,77,123,.18);
        border-radius: 999px;
        padding: 0 12px;
        background: rgba(255,255,255,.76);
        color: var(--pink-dark);
        font-size: 11px;
        font-weight: 900;
        box-shadow: 0 10px 24px rgba(201,54,98,.14);
      }
      .screen { padding: 18px 16px 98px; }
      .hero {
        min-height: 100vh;
        padding: calc(20px + env(safe-area-inset-top)) 20px calc(28px + env(safe-area-inset-bottom));
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .hero-title {
        margin: 12px 0 0;
        color: var(--pink);
        font-family: "Bebas Neue", Impact, sans-serif;
        font-size: clamp(78px, 22vw, 116px);
        line-height: .78;
        text-transform: uppercase;
      }
      .script {
        color: #fff;
        font-family: "Great Vibes", cursive;
        font-size: .66em;
        font-weight: 400;
        text-transform: none;
        text-shadow: 0 0 5px #fff, 0 0 16px #ff6aa0, 0 0 34px var(--pink);
      }
      .eyebrow { font-size: 11px; font-weight: 900; text-transform: uppercase; color: rgba(29,29,29,.72); }
      .polaroid-stack { position: relative; min-height: 340px; margin-top: 20px; }
      .polaroid { position: absolute; background: #fff; padding: 8px 8px 36px; box-shadow: 0 24px 44px rgba(29,29,29,.22); }
      .polaroid.main { right: -16px; top: 0; width: 78%; transform: rotate(6deg); }
      .polaroid.small { left: -8px; bottom: 18px; width: 58%; transform: rotate(-8deg); }
      .polaroid img { width: 100%; height: 210px; object-fit: cover; }
      .polaroid.main img { object-position: 78% 34%; }
      .polaroid.small img { object-position: 68% 72%; }
      .polaroid.small img { height: 145px; }
      .paper-note {
        position: absolute;
        right: 12px;
        bottom: 0;
        width: 188px;
        padding: 18px 16px;
        background: #fff8f4;
        transform: rotate(-4deg);
        box-shadow: 0 18px 32px rgba(201,54,98,.18);
        clip-path: polygon(2% 5%, 98% 0, 96% 95%, 5% 100%);
      }
      .paper-note p { margin: 0; font-size: 11px; font-weight: 900; text-transform: uppercase; line-height: 1.8; }
      .login-card {
        border: 1px solid rgba(255,255,255,.7);
        border-radius: 28px;
        padding: 16px;
        background: rgba(255,255,255,.7);
        box-shadow: 0 24px 60px rgba(201,54,98,.23);
        backdrop-filter: blur(18px);
      }
      .input, .textarea, .select {
        width: 100%;
        border: 1px solid rgba(233,77,123,.28);
        border-radius: 14px;
        background: rgba(255,255,255,.9);
        color: var(--ink);
        font-size: 13px;
        font-weight: 800;
        outline: 0;
      }
      .input, .select { min-height: 48px; padding: 0 13px; }
      .textarea { min-height: 92px; padding: 12px 13px; resize: vertical; line-height: 1.55; }
      .primary, .secondary, .danger {
        min-height: 48px;
        border-radius: 14px;
        padding: 0 15px;
        font-size: 11px;
        font-weight: 900;
        text-transform: uppercase;
      }
      .primary { width: 100%; border: 0; background: var(--pink); color: #fff; box-shadow: 0 0 18px rgba(233,77,123,.52), 0 16px 32px rgba(201,54,98,.26); }
      .secondary { border: 1px solid rgba(233,77,123,.2); background: rgba(255,255,255,.76); color: var(--ink); }
      .danger { border: 1px solid rgba(201,54,98,.32); background: rgba(201,54,98,.1); color: var(--pink-dark); }
      .error { margin: 10px 0 0; color: var(--pink-dark); font-size: 12px; font-weight: 800; }
      .tabbar {
        position: fixed;
        left: 50%;
        bottom: 0;
        z-index: 30;
        width: min(100%, 430px);
        transform: translateX(-50%);
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        padding: 8px 6px calc(8px + env(safe-area-inset-bottom));
        background: rgba(255,241,236,.92);
        border-top: 1px solid rgba(233,77,123,.16);
        backdrop-filter: blur(18px);
      }
      .tabbar button { position: relative; min-height: 54px; border: 0; border-radius: 14px; background: transparent; color: rgba(29,29,29,.55); font-size: 9px; font-weight: 900; text-transform: uppercase; }
      .tabbar button.active { background: rgba(233,77,123,.12); color: var(--pink-dark); }
      .tab-badge { position: absolute; top: 8px; right: 6px; min-width: 16px; height: 16px; border-radius: 99px; background: var(--pink); color: #fff; font-size: 9px; font-weight: 900; display: flex; align-items: center; justify-content: center; padding: 0 4px; }
      .section-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
      .section-head h1, .section-head h2 { margin: 0; color: var(--pink); font-family: "Bebas Neue", Impact, sans-serif; font-size: 44px; line-height: .9; text-transform: uppercase; }
      .section-head p { margin: 4px 0 0; font-size: 12px; font-weight: 800; color: rgba(29,29,29,.58); }
      .card { border: 1px solid rgba(233,77,123,.15); border-radius: 8px; background: rgba(255,255,255,.72); box-shadow: 0 14px 32px rgba(201,54,98,.12); overflow: hidden; }
      .course-hero {
        min-height: 250px;
        padding: 18px;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        color: #fff;
        background: linear-gradient(180deg, rgba(29,29,29,.08), rgba(29,29,29,.76)), url("./assets/girls-miami-clean.png") center / cover;
      }
      .course-hero h1 { margin: 0; font-family: "Bebas Neue", Impact, sans-serif; font-size: 58px; line-height: .82; text-transform: uppercase; }
      .course-hero p { margin: 8px 0 0; font-size: 12px; font-weight: 800; }
      .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 12px; }
      .stat { border-radius: 8px; padding: 12px 10px; background: rgba(255,255,255,.72); }
      .stat strong { display: block; color: var(--pink-dark); font-size: 19px; font-weight: 900; }
      .stat span { font-size: 10px; font-weight: 900; text-transform: uppercase; color: rgba(29,29,29,.58); }
      .progress-ring { width: 74px; height: 74px; display: grid; place-items: center; border-radius: 999px; background: conic-gradient(var(--pink) var(--pct), rgba(233,77,123,.14) 0); }
      .progress-ring span { width: 58px; height: 58px; display: grid; place-items: center; border-radius: 999px; background: var(--cream); font-size: 14px; font-weight: 900; }
      .lesson-list { display: grid; gap: 12px; }
      .lesson-card { width: 100%; display: grid; grid-template-columns: 84px 1fr 34px; gap: 12px; align-items: center; border: 1px solid rgba(233,77,123,.14); border-radius: 8px; padding: 10px; background: rgba(255,255,255,.74); text-align: left; }
      .lesson-thumb { height: 72px; width: 84px; border-radius: 7px; object-fit: cover; background: var(--pink-soft); }
      .lesson-card h3 { margin: 0; font-size: 14px; line-height: 1.2; text-transform: uppercase; }
      .lesson-card p { margin: 5px 0 0; color: rgba(29,29,29,.62); font-size: 11px; font-weight: 700; line-height: 1.4; }
      .check { width: 30px; height: 30px; display: grid; place-items: center; border-radius: 999px; background: rgba(233,77,123,.12); color: var(--pink-dark); font-size: 10px; font-weight: 900; }
      .video-box { position: relative; min-height: 226px; border-radius: 8px; overflow: hidden; background: linear-gradient(180deg, rgba(29,29,29,.08), rgba(29,29,29,.82)), var(--poster) center / cover; display: flex; align-items: center; justify-content: center; }
      .play { width: 76px; height: 76px; border: 2px solid rgba(255,255,255,.7); border-radius: 999px; background: rgba(233,77,123,.74); color: #fff; font-size: 28px; box-shadow: 0 0 28px rgba(233,77,123,.65); }
      .watermark { position: absolute; inset: 0; display: grid; grid-template-columns: repeat(2, 1fr); opacity: .28; pointer-events: none; transform: rotate(-24deg) scale(1.18); }
      .watermark span { align-self: center; justify-self: center; color: #fff; font-size: 11px; font-weight: 900; text-shadow: 0 1px 3px rgba(0,0,0,.45); }
      .lesson-body { padding: 16px 0 0; }
      .lesson-body h1 { margin: 16px 0 6px; font-family: "Bebas Neue", Impact, sans-serif; color: var(--pink); font-size: 48px; line-height: .88; text-transform: uppercase; }
      .lesson-body p, .lesson-body li { font-size: 13px; font-weight: 650; line-height: 1.7; }
      .steps { padding: 0; margin: 14px 0; list-style: none; display: grid; gap: 10px; }
      .steps li { border-radius: 8px; padding: 12px; background: rgba(255,255,255,.7); }
      .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      .resource { min-height: 126px; padding: 14px; border: 1px solid rgba(233,77,123,.14); border-radius: 8px; background: rgba(255,255,255,.72); }
      .resource strong { display: block; color: var(--pink-dark); font-size: 13px; text-transform: uppercase; }
      .resource span { display: block; margin-top: 7px; font-size: 11px; font-weight: 700; line-height: 1.45; }
      .resource-link { display: inline-block; margin-top: 10px; padding: 7px 14px; border-radius: 10px; background: var(--pink); color: #fff; font-size: 11px; font-weight: 900; text-decoration: none; text-transform: uppercase; }
      .modal-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(29,29,29,.6); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; padding: 24px; }
      .modal-card { width: 100%; max-width: 340px; border-radius: 24px; padding: 28px 20px 20px; background: #fff8f4; box-shadow: 0 24px 60px rgba(29,29,29,.28); display: grid; gap: 10px; text-align: center; }
      .modal-card p { margin: 0 0 8px; font-size: 16px; font-weight: 800; }
      .video-iframe { width: 100%; height: 226px; border: 0; display: block; border-radius: 8px; }
      .watermark-center { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 5; }
      .watermark-center span { color: rgba(255,255,255,.13); font-size: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: 3px; text-shadow: 0 1px 3px rgba(0,0,0,.3); transform: rotate(-20deg); white-space: nowrap; }
      .buy-btn { display: flex; align-items: center; justify-content: center; gap: 8px; min-height: 52px; border-radius: 16px; border: 2px solid var(--pink); background: transparent; color: var(--pink-dark); font-size: 13px; font-weight: 900; text-transform: uppercase; text-decoration: none; cursor: pointer; }
      .buy-btn:hover { background: rgba(233,77,123,.07); }
      .product-grid { display: grid; gap: 14px; }
      .product-card { border: 1px solid rgba(233,77,123,.14); border-radius: 14px; background: rgba(255,255,255,.82); overflow: hidden; box-shadow: 0 8px 24px rgba(201,54,98,.1); }
      .product-card > img { width: 100%; height: 180px; object-fit: cover; display: block; }
      .product-card-placeholder { width: 100%; height: 120px; background: linear-gradient(135deg, var(--pink-soft), var(--cream)); display: flex; align-items: center; justify-content: center; font-size: 32px; }
      .product-info { padding: 12px 14px 14px; }
      .product-info strong { display: block; font-size: 15px; font-weight: 900; text-transform: uppercase; color: var(--ink); }
      .product-info p { margin: 5px 0 10px; font-size: 12px; font-weight: 600; color: rgba(29,29,29,.65); line-height: 1.5; }
      .product-footer { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
      .product-price { font-size: 18px; font-weight: 900; color: var(--pink-dark); }
      .sold-out { font-size: 11px; font-weight: 900; color: rgba(29,29,29,.4); text-transform: uppercase; }
      .cart-panel { margin-top: 20px; border: 1px solid rgba(233,77,123,.2); border-radius: 16px; padding: 16px; background: rgba(255,255,255,.88); }
      .cart-panel h3 { margin: 0 0 12px; font-family: "Bebas Neue", Impact, sans-serif; font-size: 28px; color: var(--pink); }
      .cart-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid rgba(233,77,123,.1); font-size: 13px; font-weight: 700; }
      .cart-item span:first-child { flex: 1; }
      .cart-item button { width: 28px; height: 28px; border-radius: 99px; border: 1px solid rgba(201,54,98,.25); background: rgba(201,54,98,.08); color: var(--pink-dark); font-size: 16px; font-weight: 900; cursor: pointer; }
      .cart-total { padding: 10px 0; font-size: 15px; font-weight: 900; color: var(--pink-dark); text-align: right; }
      .admin-tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 14px; }
      .admin-tabs button { min-height: 38px; border: 1px solid rgba(233,77,123,.18); border-radius: 10px; background: rgba(255,255,255,.7); font-size: 9px; font-weight: 900; text-transform: uppercase; }
      .admin-tabs button.active { background: rgba(233,77,123,.14); color: var(--pink-dark); }
      .accordion-item { border: 1px solid rgba(233,77,123,.15); border-radius: 10px; overflow: hidden; background: rgba(255,255,255,.8); }
      .accordion-head { display: flex; align-items: center; gap: 10px; padding: 10px 12px; cursor: pointer; background: transparent; border: 0; width: 100%; text-align: left; }
      .accordion-head img { width: 48px; height: 48px; object-fit: cover; border-radius: 6px; flex-shrink: 0; background: var(--pink-soft); }
      .accordion-head-placeholder { width: 48px; height: 48px; border-radius: 6px; background: var(--pink-soft); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; }
      .accordion-head-info { flex: 1; min-width: 0; }
      .accordion-head-info strong { display: block; font-size: 13px; font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .accordion-head-info span { font-size: 10px; font-weight: 700; color: rgba(29,29,29,.5); }
      .accordion-arrow { font-size: 12px; color: rgba(29,29,29,.4); flex-shrink: 0; }
      .accordion-body { padding: 0 12px 12px; border-top: 1px solid rgba(233,77,123,.1); }
      .instock-toggle { display: flex; align-items: center; gap: 8px; padding: 10px 0; font-size: 12px; font-weight: 800; cursor: pointer; }
      .student-card { border: 1px solid rgba(233,77,123,.15); border-radius: 14px; background: rgba(255,255,255,.88); overflow: hidden; box-shadow: 0 6px 18px rgba(201,54,98,.09); }
      .student-head { padding: 12px 14px 10px; display: flex; align-items: center; gap: 12px; }
      .student-avatar { width: 44px; height: 44px; border-radius: 999px; background: linear-gradient(135deg, var(--pink), var(--pink-dark)); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; font-weight: 900; flex-shrink: 0; }
      .student-meta { flex: 1; min-width: 0; }
      .student-meta strong { display: block; font-size: 14px; font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .student-meta span { font-size: 10px; font-weight: 700; color: rgba(29,29,29,.5); text-transform: uppercase; }
      .student-progress { padding: 0 14px 4px; }
      .progress-bar-wrap { height: 6px; border-radius: 99px; background: rgba(233,77,123,.12); overflow: hidden; margin: 6px 0 4px; }
      .progress-bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--pink), var(--pink-dark)); transition: width .4s; }
      .progress-label { display: flex; justify-content: space-between; font-size: 10px; font-weight: 800; color: rgba(29,29,29,.5); text-transform: uppercase; }
      .lesson-dots { display: flex; flex-wrap: wrap; gap: 5px; padding: 8px 14px 10px; }
      .lesson-dot { width: 24px; height: 24px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 900; }
      .lesson-dot.done { background: rgba(233,77,123,.18); color: var(--pink-dark); }
      .lesson-dot.pending { background: rgba(29,29,29,.07); color: rgba(29,29,29,.35); }
      .student-actions { display: flex; gap: 8px; padding: 8px 14px 14px; border-top: 1px solid rgba(233,77,123,.08); margin-top: 2px; }
      .days-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 99px; background: rgba(233,77,123,.1); color: var(--pink-dark); font-size: 10px; font-weight: 900; }
      .admin-form, .admin-panel { display: grid; gap: 10px; }
      .admin-tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
      .admin-tabs button { min-height: 42px; border: 1px solid rgba(233,77,123,.18); border-radius: 12px; background: rgba(255,255,255,.7); font-size: 10px; font-weight: 900; text-transform: uppercase; }
      .admin-tabs button.active { background: rgba(233,77,123,.14); color: var(--pink-dark); }
      .field-label { display: grid; gap: 5px; font-size: 10px; font-weight: 900; text-transform: uppercase; color: rgba(29,29,29,.62); }
      .notice { border-radius: 8px; padding: 12px; background: rgba(216,162,74,.16); font-size: 11px; font-weight: 800; line-height: 1.55; }
      .admin-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 12px; border-radius: 8px; background: rgba(255,255,255,.72); }
      .admin-row strong { display: block; font-size: 13px; }
      .admin-row span { font-size: 10px; font-weight: 900; color: rgba(29,29,29,.55); text-transform: uppercase; }
      .row-actions { display: flex; gap: 8px; flex-wrap: wrap; }
      .admin-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .status { margin: 0; border-radius: 8px; padding: 10px 12px; background: rgba(233,77,123,.1); color: var(--pink-dark); font-size: 11px; font-weight: 900; line-height: 1.45; }
      /* ── Upload button ── */
      .upload-area { border: 2px dashed rgba(233,77,123,.35); border-radius: 12px; padding: 14px; text-align: center; cursor: pointer; transition: border-color .2s; background: rgba(233,77,123,.04); }
      .upload-area:hover { border-color: var(--pink); background: rgba(233,77,123,.08); }
      .upload-area input[type=file] { display: none; }
      .upload-area span { display: block; font-size: 12px; font-weight: 800; color: var(--pink-dark); }
      .upload-area small { display: block; margin-top: 3px; font-size: 10px; font-weight: 700; color: rgba(29,29,29,.45); }
      .upload-preview { width: 100%; height: 130px; object-fit: cover; border-radius: 8px; margin-bottom: 8px; }
      /* ── Category filter ── */
      .cat-tabs { display: flex; gap: 8px; overflow-x: auto; padding: 2px 0 10px; scrollbar-width: none; -ms-overflow-style: none; }
      .cat-tabs::-webkit-scrollbar { display: none; }
      .cat-tab { flex-shrink: 0; padding: 7px 16px; border-radius: 99px; border: 1px solid rgba(233,77,123,.22); background: rgba(255,255,255,.78); font-size: 11px; font-weight: 900; color: rgba(29,29,29,.65); text-transform: uppercase; cursor: pointer; }
      .cat-tab.active { background: var(--pink); color: #fff; border-color: var(--pink); box-shadow: 0 4px 14px rgba(233,77,123,.38); }
      /* ── Back button ── */

      function getClient() {
        const stored = JSON.parse(localStorage.getItem(CLIENT_KEY) || "{}");
        if (!stored.deviceId) stored.deviceId = crypto.randomUUID ? crypto.randomUUID() : String(Date.now());
        if (!stored.lang) stored.lang = "ru";
        localStorage.setItem(CLIENT_KEY, JSON.stringify(stored));
        return stored;
      }

      function saveClient(patch) {
        const next = { ...getClient(), ...patch };
        localStorage.setItem(CLIENT_KEY, JSON.stringify(next));
        return next;
      }

      function extractYoutubeId(url) {
        const match = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/);
        return match ? match[1] : null;
      }

      async function request(path, options = {}) {
        const headers = { "Content-Type": "application/json", ...(options.headers || {}) };
        const response = await fetch(`${API}${path}`, { ...options, headers });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || "Request failed");
        return data;
      }

      const CART_KEY = "miami-lash-cart-v1";
      const DARK_KEY = "miami-lash-dark-v1";

      function urlBase64ToUint8Array(b64) {
        const pad = "=".repeat((4 - b64.length % 4) % 4);
        const raw = atob((b64 + pad).replace(/-/g, "+").replace(/_/g, "/"));
        return Uint8Array.from([...raw].map((c) => c.charCodeAt(0)));
      }

      function App() {
        const [client, setClient] = useState(getClient);
        const [course, setCourse] = useState(null);
        const [user, setUser] = useState(client.user || null);
        const [admin, setAdmin] = useState(Boolean(client.adminToken));
        const [view, setView] = useState(client.token ? "home" : "login");
        const [activeLessonId, setActiveLessonId] = useState("");
        const [loading, setLoading] = useState(Boolean(client.token));
        const [error, setError] = useState("");
        const [cart, setCartRaw] = useState(() => { try { return JSON.parse(localStorage.getItem(CART_KEY) || "[]"); } catch { return []; } });
        const setCart = (next) => { setCartRaw(next); localStorage.setItem(CART_KEY, JSON.stringify(next)); };
        const cartCount = cart.reduce((s, i) => s + i.qty, 0);
        const [darkMode, setDarkModeRaw] = useState(() => localStorage.getItem(DARK_KEY) === "1");
        const toggleDark = () => { const next = !darkMode; setDarkModeRaw(next); localStorage.setItem(DARK_KEY, next ? "1" : "0"); };
        useEffect(() => { document.documentElement.dataset.theme = darkMode ? "dark" : ""; }, [darkMode]);
        const lang = client.lang || "en";
        const t = ui[lang];

        const refreshCourse = async () => {
          if (!client.token) return;
          setLoading(true);
          setError("");
          try {
            const data = await request("/api/course", { headers: { Authorization: `Bearer ${client.token}` } });
            setCourse(data.course);
            setUser(data.user);
            setActiveLessonId(data.course.lessons[0]?.id || "");
          } catch (err) {
            setError(t.serverError);
            setClient(saveClient({ token: null, user: null }));
            setView("login");
          } finally {
            setLoading(false);
          }
        };

        useEffect(() => { refreshCourse(); }, []);

        const setLang = (nextLang) => setClient(saveClient({ lang: nextLang }));
        const signOut = () => {
          setClient(saveClient({ token: null, user: null, adminToken: null }));
          setUser(null);
          setCourse(null);
          setAdmin(false);
          setView("login");
        };

        if (loading) return <Shell><main className="screen"><p className="notice">{t.loading}</p></main></Shell>;
        if (view === "admin-login") return <AdminLogin t={t} lang={lang} setLang={setLang} setClient={setClient} setAdmin={setAdmin} setView={setView} />;
        if (!client.token && (view === "admin" || client.adminToken)) {

      function HomeScreen({ course, t, lang, user, setView, setActiveLessonId, token }) {
        const [pushState, setPushState] = useState("idle"); // idle | asking | done | unsupported | error
        const [pushErr, setPushErr] = useState("");
        useEffect(() => {
          if (!("Notification" in window) || !("serviceWorker" in navigator)) { setPushState("unsupported"); return; }
          if (Notification.permission !== "granted") return;
          // Check if there is an actual push subscription saved
          navigator.serviceWorker.ready.then((reg) => reg.pushManager.getSubscription()).then((sub) => { if (sub) setPushState("done"); }).catch(() => {});
        }, []);
        const subscribePush = async () => {
          setPushState("asking"); setPushErr("");
          try {
            const perm = await Notification.requestPermission();
            if (perm !== "granted") { setPushState("idle"); return; }
            const reg = await navigator.serviceWorker.ready;
            const keyData = await fetch("/api/push/key").then((r) => r.json());
            if (!keyData.publicKey) throw new Error(lang === "ru" ? "Push не настроен на сервере" : "Push not configured on server");
            const sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: urlBase64ToUint8Array(keyData.publicKey) });
            await request("/api/push/subscribe", { method: "POST", headers: { Authorization: `Bearer ${token}` }, body: JSON.stringify({ subscription: sub }) });
            setPushState("done");
          } catch (ex) { setPushState("error"); setPushErr(ex.message || "Error"); }
        };
        const hero = course.settings.hero[lang];
        const done = user.completed.length;
        const pct = Math.round((done / course.lessons.length) * 100);
        const nextLesson = course.lessons.find((lesson) => !user.completed.includes(lesson.id)) || course.lessons[0];
        const content = nextLesson.content[lang];
        return (
          <main className="screen">
            <section className="course-hero card"><p className="eyebrow" style={{ color: "rgba(255,255,255,.82)" }}>{t.premiumTraining}</p><h1>{hero.title}<br /><span className="script">{hero.script}</span></h1><p>{hero.subtitle}</p></section>
            <div className="stats"><div className="stat"><strong>{course.lessons.length}</strong><span>{t.statsLessons}</span></div><div className="stat"><strong>{done}</strong><span>{t.statsDone}</span></div><div className="stat"><strong>{pct}%</strong><span>{t.statsProgress}</span></div></div>
            <section style={{ marginTop: 22 }} className="card">
              <div style={{ padding: 16, display: "grid", gridTemplateColumns: "1fr 74px", gap: 14, alignItems: "center" }}>
                <div><p className="eyebrow">{t.continueTraining}</p><h2 style={{ margin: "4px 0 8px", fontSize: 22, textTransform: "uppercase" }}>{content.title}</h2><p style={{ margin: 0, fontSize: 12, fontWeight: 700, lineHeight: 1.55 }}>{content.meta}</p></div>
                <div className="progress-ring" style={{ "--pct": `${pct}%` }}><span>{pct}%</span></div>
              </div>
              <div style={{ padding: "0 16px 16px" }}><button className="primary" onClick={() => { setActiveLessonId(nextLesson.id); setView("lesson"); }}>{t.openLesson}</button></div>
            </section>
            <section style={{ marginTop: 22 }}><div className="section-head"><div><h2>{t.today}</h2><p>{t.practicePlan}</p></div></div><div className="grid-2"><div className="resource"><strong>30 min</strong><span>{t.todayOne}</span></div><div className="resource"><strong>Photo</strong><span>{t.todayTwo}</span></div></div></section>
            {pushState !== "unsupported" && pushState !== "done" && (
              <div className="card" style={{ marginTop: 16, padding: 16, display: "flex", alignItems: "center", gap: 12 }}>
                <span style={{ fontSize: 24 }}>🔔</span>
                <div style={{ flex: 1 }}>
                  <strong style={{ display: "block", fontSize: 13 }}>{lang === "ru" ? "Уведомления о новых уроках" : "Lesson notifications"}</strong>
                  <span style={{ fontSize: 11, fontWeight: 700, color: "rgba(29,29,29,.55)" }}>{lang === "ru" ? "Узнавай первой когда выходит новый урок" : "Be first to know when a new lesson drops"}</span>
                  {pushState === "error" && <span style={{ display: "block", marginTop: 4, fontSize: 10, fontWeight: 800, color: "var(--pink-dark)" }}>⚠️ {pushErr}</span>}
                </div>
                <button className="primary" style={{ width: "auto", padding: "0 14px", minHeight: 38, fontSize: 11 }} onClick={subscribePush} disabled={pushState === "asking"}>
                  {pushState === "asking" ? "..." : lang === "ru" ? "Включить" : "Enable"}
                </button>
              </div>
            )}
            {pushState === "done" && (
              <p style={{ textAlign: "center", fontSize: 12, fontWeight: 800, color: "var(--pink-dark)", marginTop: 14 }}>🔔 {lang === "ru" ? "Уведомления включены" : "Notifications on"}</p>
            )}
          </main>
        );
      }

      function LessonScreen({ t, lang, user, lesson, setUser, token, setView }) {
        const content = lesson.content[lang];
        const isDone = user.completed.includes(lesson.id);
        const markDone = async () => {
          if (isDone) return;
          const completed = [...user.completed, lesson.id];
          await request("/api/progress", { method: "POST", headers: { Authorization: `Bearer ${token}` }, body: JSON.stringify({ completed }) });
          setUser({ ...user, completed });
        };
        const videoUrl = lesson.videoUrl || "";
        const youtubeId = videoUrl ? extractYoutubeId(videoUrl) : null;
        const isDirectVideo = videoUrl && !youtubeId;
        return (
          <main className="screen">
            <button className="back-btn" onClick={() => setView("lessons")}>← {lang === "ru" ? "Все уроки" : "All lessons"}</button>
            {youtubeId ? (
              <div style={{ position: "relative", borderRadius: 8, overflow: "hidden", userSelect: "none" }}>
                <iframe
                  className="video-iframe"
                  src={`https://www.youtube.com/embed/${youtubeId}?rel=0&modestbranding=1&iv_load_policy=3&fs=1&playsinline=1`}
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
                  allowFullScreen
                />
                <div onContextMenu={(e) => e.preventDefault()} style={{ position: "absolute", top: 0, left: 0, right: 0, height: 48, zIndex: 10, cursor: "default" }} />
                <div className="watermark-center"><span>{user.code}</span></div>
              </div>
            ) : isDirectVideo ? (
              <div style={{ position: "relative", borderRadius: 8, overflow: "hidden", background: "#000" }}>
                <video controls controlsList="nodownload" onContextMenu={(e) => e.preventDefault()} style={{ width: "100%", maxHeight: 260, display: "block", background: "#000" }} src={videoUrl} />
                <div className="watermark-center"><span>{user.code}</span></div>
              </div>
            ) : (
              <div className="video-box" style={{ "--poster": `url(${lesson.poster})` }}><button className="play">▶</button><div className="watermark-center"><span>{user.code}</span></div></div>
            )}
            {lesson.images && lesson.images.length > 0 && (
              <div className="lesson-images">
                {lesson.images.map((src, i) => (
                  <img key={i} src={src} alt={`Материал ${i + 1}`} onClick={() => window.open(src, "_blank")} loading="lazy" />

              </div>
            )}
            <div className="lesson-body"><p className="eyebrow">{content.meta}</p><h1>{content.title}</h1><p>{content.note}</p><ul className="steps">{content.steps.map((step, index) => <li key={`${step}-${index}`}><strong>{index + 1}.</strong> {step}</li>)}</ul><button className="primary" onClick={markDone}>{isDone ? t.completed : t.markComplete}</button></div>
          </main>
        );
      }

        { id: "all", ru: "Все товары", en: "All" },

      function ShopScreen({ course, t, lang, cart, setCart }) {
        const [showCart, setShowCart] = useState(false);
        const [activeCat, setActiveCat] = useState("all");
        const [tgStatus, setTgStatus] = useState(""); // "" | "sending" | "sent" | "error"
        const products = course.products || [];
        const filtered = activeCat === "all" ? products : products.filter((p) => (p.category || "other") === activeCat);
        const addToCart = (product) => {
          const exists = cart.find((i) => i.productId === product.id);
          setCart(exists ? cart.map((i) => i.productId === product.id ? { ...i, qty: i.qty + 1 } : i) : [...cart, { productId: product.id, qty: 1 }]);
        };
        const removeFromCart = (productId) => setCart(cart.filter((i) => i.productId !== productId));
        const cartCount = cart.reduce((s, i) => s + i.qty, 0);
        const cartTotal = cart.reduce((s, i) => { const p = products.find((x) => x.id === i.productId); return s + (p ? p.price * i.qty : 0); }, 0);
        const currency = cart.length ? (products.find((p) => p.id === cart[0].productId)?.currency || "USD") : "USD";

        const checkoutTG = async () => {
          const lines = cart.map((i) => {
            const p = products.find((x) => x.id === i.productId);
            return p ? `• ${(p.content[lang] || p.content["ru"])?.title} ×${i.qty} — ${p.price * i.qty} ${p.currency}` : "";
          }).filter(Boolean).join("\n");
          const text = `🛍 Заказ Miami Lash:\n${lines}\n\n💰 Итого: ${cartTotal} ${currency}`;
          setTgStatus("sending");
          try {
            await request("/api/telegram/order", { method: "POST", body: JSON.stringify({ text }) });
            setTgStatus("sent");
            setTimeout(() => setTgStatus(""), 6000);
          } catch {
            // fallback: copy to clipboard and open bot
            navigator.clipboard?.writeText(text).catch(() => {});
            setTgStatus("error");
            setTimeout(() => setTgStatus(""), 6000);
            window.open("https://t.me/miamilashbot", "_blank");
          }
        };
        const checkoutWA = () => {
          const items = cart.map((i) => { const p = products.find((x) => x.id === i.productId); return p ? `${(p.content[lang] || p.content["ru"])?.title} ×${i.qty}` : ""; }).filter(Boolean).join(", ");
          window.open(`https://wa.me/13059008808?text=${encodeURIComponent(`Хочу заказать: ${items}. Итого: ${cartTotal} ${currency}`)}`, "_blank");
        };

        return (
          <main className="screen">
            <div className="section-head">
              <div><h1>{t.shop}</h1><p>{lang === "ru" ? "Материалы для наращивания" : "Lash supplies & tools"}</p></div>
              {cartCount > 0 && (
                <button className="icon-button" style={{ gap: 4 }} onClick={() => setShowCart(!showCart)}>
                  🛒 <span style={{ fontWeight: 900 }}>{cartCount}</span>
                </button>
              )}
            </div>
            <div className="cat-tabs">
              {SHOP_CATS.map((cat) => (
                <button key={cat.id} className={`cat-tab${activeCat === cat.id ? " active" : ""}`} onClick={() => setActiveCat(cat.id)}>
                  {lang === "ru" ? cat.ru : cat.en}
                </button>
              ))}
            </div>
            {showCart && cartCount > 0 && (
              <div className="cart-panel">
                <h3>🛒 {t.cartTitle}</h3>
                {cart.map((item) => {
                  const p = products.find((x) => x.id === item.productId);
                  if (!p) return null;
                  const c = p.content[lang] || p.content["ru"] || {};
                  return (
                    <div className="cart-item" key={item.productId}>
                      {p.image
                        ? <img className="cart-item-img" src={p.image} alt={c.title} onError={(e)=>e.target.style.display="none"} />
                        : <div className="cart-item-img" style={{display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>💎</div>}
                      <div className="cart-item-info">
                        <strong>{c.title}</strong>
                        <span>{item.qty} × {p.price} {p.currency}</span>
                      </div>
                      <span style={{ fontWeight: 900, fontSize: 13, color: "var(--pink-dark)", flexShrink: 0 }}>{p.price * item.qty} {p.currency}</span>
                      <button className="cart-item-rm" onClick={() => removeFromCart(item.productId)}>×</button>
                    </div>
                  );
                })}
                <div className="cart-total">{t.cartTotal}: {cartTotal} {currency}</div>
                {tgStatus === "sent" && <p style={{ margin: "4px 0 8px", fontSize: 12, fontWeight: 800, color: "var(--pink-dark)", textAlign: "center" }}>✅ {lang === "ru" ? "Заявка отправлена в Telegram!" : "Order sent to Telegram!"}</p>}
                {tgStatus === "error" && <p style={{ margin: "4px 0 8px", fontSize: 11, fontWeight: 800, color: "var(--pink-dark)", textAlign: "center" }}>📋 {lang === "ru" ? "Список скопирован — вставьте в бот" : "Copied — paste to bot"}</p>}
                <div style={{ display: "grid", gap: 8, marginTop: 4 }}>
                  <button className="primary" style={{ fontSize: 12, background: "#229ed9", boxShadow: "0 0 18px rgba(34,158,217,.45)" }} disabled={tgStatus === "sending"} onClick={checkoutTG}>
                    {tgStatus === "sending" ? "⏳ Отправка..." : "✈️ " + (lang === "ru" ? "Оформить через Telegram" : "Order via Telegram")}
                  </button>
                  <button className="primary" style={{ fontSize: 12, background: "#25d366", boxShadow: "0 0 18px rgba(37,211,102,.38)" }} onClick={checkoutWA}>💬 WhatsApp</button>
                </div>
              </div>
            )}
            {filtered.length === 0 ? (
              <p className="notice" style={{ marginTop: 8 }}>{activeCat === "all" ? t.shopEmpty : (lang === "ru" ? "В этой категории пока нет товаров" : "No products in this category")}</p>
            ) : (
              <div className="product-grid" style={{ marginTop: 8 }}>
                {filtered.map((product) => {
                  const content = product.content[lang] || product.content["ru"] || {};
                  const inCart = cart.find((i) => i.productId === product.id);
                  return (
                    <div className="product-card" key={product.id}>
                      <div className="product-img-wrap">
                        {product.image
                          ? <img src={product.image} alt={content.title} loading="lazy" onError={(e)=>e.target.style.display="none"} />
                          : <div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:38}}>💎</div>}
                      </div>
                      <div className="product-info">
                        <strong>{content.title}</strong>
                        {content.description && <p>{content.description}</p>}
                        <div className="product-footer">
                          <span className="product-price">{product.price} {product.currency}</span>
                          {product.inStock !== false ? (
                            <button className="primary" style={{ minHeight: 36, padding: "0 14px", fontSize: 11, width: "auto" }} onClick={() => addToCart(product)}>
                              {inCart ? `${t.inCart} (${inCart.qty})` : t.addToCart}
                            </button>
                          ) : <span className="sold-out">{t.outOfStock}</span>}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </main>
        );
      }

      function PushSender({ adminToken, lang }) {
        const [title, setTitle] = useState("Miami Lash Course");
        const [body, setBody] = useState("");
        const [status, setStatus] = useState("");
        const [busy, setBusy] = useState(false);
        const send = async () => {
          if (!body.trim()) return;
          setBusy(true); setStatus("");
          try {
            const data = await request("/api/push/send", {
              method: "POST",
              headers: { Authorization: `Bearer ${adminToken}` },
              body: JSON.stringify({ title, body })
            });
            setStatus(lang === "ru" ? `✅ Отправлено: ${data.sent ?? 0} получателей` : `✅ Sent to ${data.sent ?? 0} recipients`);
            setBody("");
          } catch (err) {
            setStatus("❌ " + (err.message || "Error"));
          } finally {
            setBusy(false);
          }
        };
        return (
          <div className="admin-form">
            <label className="field-label">{lang === "ru" ? "Заголовок" : "Title"}
              <input className="input" value={title} onChange={(e) => setTitle(e.target.value)} />
            </label>
            <label className="field-label">{lang === "ru" ? "Текст уведомления" : "Message"}
              <textarea className="textarea" style={{ minHeight: 72 }} value={body} onChange={(e) => setBody(e.target.value)} placeholder={lang === "ru" ? "Текст сообщения..." : "Message text..."} />
            </label>
            {status && <p className="status" style={{ margin: 0 }}>{status}</p>}
            <button className="primary" disabled={busy || !body.trim()} onClick={send}>
              {busy ? "..." : lang === "ru" ? "📨 Отправить всем" : "📨 Send to all"}
            </button>
          </div>
        );
      }

      function FileUploader({ adminToken, accept, label, hint, onUploaded, maxSize = 640, quality = 0.82 }) {
        const [uploading, setUploading] = useState(false);
        const [err, setErr] = useState("");
        const inputRef = React.useRef(null);
        const pick = () => inputRef.current?.click();

        const resizeImage = (file) => new Promise((res, rej) => {
          const img = new Image();
          const objUrl = URL.createObjectURL(file);
          img.onload = () => {
            URL.revokeObjectURL(objUrl);
            const MAX = maxSize;
            let { width, height } = img;
            if (width > MAX) { height = Math.round(height * MAX / width); width = MAX; }
            if (height > MAX && width <= MAX) { width = Math.round(width * MAX / height); height = MAX; }
            const canvas = document.createElement("canvas");
            canvas.width = width; canvas.height = height;
            canvas.getContext("2d").drawImage(img, 0, 0, width, height);
            res(canvas.toDataURL("image/jpeg", quality));
          };
          img.onerror = rej;
          img.src = objUrl;
        });

        const handleFile = async (e) => {
          const file = e.target.files?.[0];
          if (!file) return;
          setErr(""); setUploading(true);
          try {
            let b64, mime, fname;
            if (file.type.startsWith("image/")) {
              // Resize client-side first (reduces bandwidth), then upload to public assets repo
              const dataUrl = await resizeImage(file);
              b64 = dataUrl.split(",")[1];
              mime = "image/jpeg";
              fname = file.name.replace(/\.[^.]+$/, ".jpg");
            } else {
              // Video: read as-is, server enforces size limit
              const reader = new FileReader();
              b64 = await new Promise((res, rej) => {
                reader.onload = () => res(reader.result.split(",")[1]);
                reader.onerror = rej;
                reader.readAsDataURL(file);
              });
              mime = file.type;
              fname = file.name;
            }
            // Upload to public assets repo → get a real public URL (not base64 in store)
            const result = await request("/api/upload", {
              method: "POST",
              headers: { Authorization: `Bearer ${adminToken}` },
              body: JSON.stringify({ filename: fname, contentType: mime, data: b64 })
            });
            onUploaded(result.url);
          } catch (ex) {
            setErr(ex.message || "Upload failed");
          } finally {
            setUploading(false);
            if (e.target) e.target.value = "";
          }
        };

        return (
          <div className="upload-area" onClick={pick} style={{ marginTop: 6 }}>
            <input type="file" accept={accept} ref={inputRef} onChange={handleFile} />
            <span>{uploading ? "⏳ Обработка..." : label}</span>
            {hint && <small>{hint}</small>}
            {err && <p className="error" style={{ margin: "6px 0 0" }}>{err}</p>}
          </div>
        );
      }

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      }
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
