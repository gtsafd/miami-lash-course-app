      function getClient() {
        const stored = JSON.parse(localStorage.getItem(CLIENT_KEY) || "{}");
        if (!stored.deviceId) stored.deviceId = crypto.randomUUID ? crypto.randomUUID() : String(Date.now());
        if (!stored.lang) stored.lang = "en";
        localStorage.setItem(CLIENT_KEY, JSON.stringify(stored));
        return stored;
      }

      function saveClient(patch) {
        const next = { ...getClient(), ...patch };
        localStorage.setItem(CLIENT_KEY, JSON.stringify(next));
        return next;
      }

      function extractYoutubeId(url) {
        const match = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/);
        return match ? match[1] : null;
      }

      async function request(path, options = {}) {
        const headers = { "Content-Type": "application/json", ...(options.headers || {}) };
        const response = await fetch(`${API}${path}`, { ...options, headers });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || "Request failed");
        return data;
      }

      const CART_KEY = "miami-lash-cart-v1";

      function App() {
        const [client, setClient] = useState(getClient);
        const [course, setCourse] = useState(null);
        const [user, setUser] = useState(client.user || null);
        const [admin, setAdmin] = useState(Boolean(client.adminToken));
        const [view, setView] = useState(client.token ? "home" : "login");
        const [activeLessonId, setActiveLessonId] = useState("");
        const [loading, setLoading] = useState(Boolean(client.token));
        const [error, setError] = useState("");
        const [cart, setCartRaw] = useState(() => { try { return JSON.parse(localStorage.getItem(CART_KEY) || "[]"); } catch { return []; } });
        const setCart = (next) => { setCartRaw(next); localStorage.setItem(CART_KEY, JSON.stringify(next)); };
        const cartCount = cart.reduce((s, i) => s + i.qty, 0);
        const lang = client.lang || "en";
        const t = ui[lang];

        const refreshCourse = async () => {
          if (!client.token) return;
          setLoading(true);
          setError("");
          try {
            const data = await request("/api/course", { headers: { Authorization: `Bearer ${client.token}` } });
            setCourse(data.course);
            setUser(data.user);
            setActiveLessonId(data.course.lessons[0]?.id || "");
          } catch (err) {
            setError(t.serverError);
            setClient(saveClient({ token: null, user: null }));
            setView("login");
          } finally {
            setLoading(false);
          }
        };

        useEffect(() => { refreshCourse(); }, []);

        const setLang = (nextLang) => setClient(saveClient({ lang: nextLang }));
        const signOut = () => {
          setClient(saveClient({ token: null, user: null, adminToken: null }));
          setUser(null);
          setCourse(null);
          setAdmin(false);
          setView("login");
        };

        if (loading) return <Shell><main className="screen"><p className="notice">{t.loading}</p></main></Shell>;
        if (view === "admin-login") return <AdminLogin t={t} lang={lang} setLang={setLang} setClient={setClient} setAdmin={setAdmin} setView={setView} />;
        if (!client.token && (view === "admin" || client.adminToken)) {
          return (
            <Shell course={{ settings: { eyebrow: "Lash Artist | Hanna Kozak", brand: "MIAMI LASH COURSE" } }} lang={lang} setLang={setLang} signOut={signOut}>
              <AdminScreen t={t} lang={lang} setLang={setLang} client={client} course={course || { lessons: [], resources: [] }} setCourse={setCourse} />
            </Shell>
          );
        }
        if (!client.token) return <LoginScreen t={t} lang={lang} setLang={setLang} setClient={setClient} setCourse={setCourse} setUser={setUser} setView={setView} />;
        if (!course) return <Shell><main className="screen"><p className="notice">{error || t.serverError}</p><button className="primary" onClick={refreshCourse}>{t.loading}</button></main></Shell>;

        const activeLesson = course.lessons.find((lesson) => lesson.id === activeLessonId) || course.lessons[0];
        const currentView = view === "login" ? "home" : view;

        return (
          <Shell course={course} lang={lang} setLang={setLang} signOut={signOut}>
            {currentView === "home" && <HomeScreen course={course} t={t} lang={lang} user={user} setView={setView} setActiveLessonId={setActiveLessonId} />}
            {currentView === "lessons" && <LessonsScreen course={course} t={t} lang={lang} user={user} setView={setView} setActiveLessonId={setActiveLessonId} />}
            {currentView === "lesson" && <LessonScreen course={course} t={t} lang={lang} user={user} lesson={activeLesson} setUser={setUser} token={client.token} />}
            {currentView === "resources" && <ResourcesScreen course={course} t={t} lang={lang} />}
            {currentView === "shop" && <ShopScreen course={course} t={t} lang={lang} cart={cart} setCart={setCart} />}
            {currentView === "admin" && admin && <AdminScreen t={t} lang={lang} setLang={setLang} client={client} course={course} setCourse={setCourse} />}
            {currentView === "admin" && !admin && <AdminLogin t={t} lang={lang} setLang={setLang} setClient={setClient} setAdmin={setAdmin} setView={setView} />}
            <nav className="tabbar">
              {[["home", t.home], ["lessons", t.lessons], ["resources", t.files], ["shop", t.shop], ["admin", t.admin]].map(([id, label]) => (
                <button key={id} className={currentView === id ? "active" : ""} onClick={() => setView(id)}>
                  {id === "shop" && cartCount > 0 && <span className="tab-badge">{cartCount}</span>}
                  {label}
                </button>
              ))}
            </nav>
          </Shell>
        );
      }

      function Shell({ children, course, lang, setLang, signOut }) {
        const [confirmLogout, setConfirmLogout] = useState(false);
        return (
          <div className="app-shell">
            {confirmLogout && (
              <div className="modal-overlay" onClick={() => setConfirmLogout(false)}>
                <div className="modal-card" onClick={(e) => e.stopPropagation()}>
                  <p>{lang === "ru" ? "Вы точно хотите выйти?" : "Are you sure you want to sign out?"}</p>
                  <button className="danger" style={{ minHeight: 48, borderRadius: 14, fontSize: 11, fontWeight: 900, textTransform: "uppercase" }} onClick={() => { setConfirmLogout(false); signOut(); }}>
                    {lang === "ru" ? "Выйти" : "Sign Out"}
                  </button>
                  <button className="secondary" style={{ minHeight: 48, borderRadius: 14, fontSize: 11, fontWeight: 900, textTransform: "uppercase" }} onClick={() => setConfirmLogout(false)}>
                    {lang === "ru" ? "Отмена" : "Cancel"}
                  </button>
                </div>
              </div>

            {course && (

                  <button className="icon-button" onClick={() => setLang(lang === "en" ? "ru" : "en")}>{lang.toUpperCase()}</button>

                </div>

            {children}
          </div>

      }

      function LoginScreen({ t, lang, setLang, setClient, setCourse, setUser, setView }) {
        const [name, setName] = useState("");
        const [code, setCode] = useState("");
        const [error, setError] = useState("");
        const submit = async (event) => {
          event.preventDefault();
          setError("");
          try {
            const current = getClient();
            const data = await request("/api/redeem", {
              method: "POST",
              body: JSON.stringify({ name, code, deviceId: current.deviceId })

            setClient(saveClient({ token: data.token, user: data.user }));
            setUser(data.user);
            setCourse(data.course);
            setView("home");

            setError(err.message || t.wrong);

                  <p className="eyebrow">Lash Artist | Hanna Kozak</p>
                  <button className="icon-button" onClick={() => setLang(lang === "en" ? "ru" : "en")}>{lang.toUpperCase()}</button>
                </div>
                <h1 className="hero-title">Girls<br /><span className="script">Miami</span></h1>

                {error && <p className="error">{error}</p>}
                <div style={{ height: 12 }} />
                <button className="primary">{t.unlock}</button>
                <div style={{ height: 10 }} />
                <a href="https://instagram.com/alex_kozak_" target="_blank" rel="noopener noreferrer" className="buy-btn">
                  <span style={{ fontSize: 16 }}>✦</span> {t.buyCourse}
                </a>
                <div style={{ height: 8 }} />

              </form>
            </main>
          </div>
        );
      }

      function AdminLogin({ t, lang, setLang, setClient, setAdmin, setView }) {
        const [password, setPassword] = useState("");
        const [error, setError] = useState("");
        const submit = async (event) => {
          event.preventDefault();
          setError("");

            const data = await request("/api/admin/login", { method: "POST", body: JSON.stringify({ password }) });

            setAdmin(true);
            setView("admin");
          } catch (err) {
            setError(t.wrong);
          }

        return (
          <div className="app-shell">
            <main className="hero">
              <div>
                <div className="top-actions" style={{ justifyContent: "space-between" }}>
                  <p className="eyebrow">Lash Artist | Hanna Kozak</p>
                  <button className="icon-button" onClick={() => setLang(lang === "en" ? "ru" : "en")}>{lang.toUpperCase()}</button>

                <h1 className="hero-title">{t.admin}<br /><span className="script">Miami</span></h1>

      function HomeScreen({ course, t, lang, user, setView, setActiveLessonId }) {
        const hero = course.settings.hero[lang];
        const done = user.completed.length;
        const pct = Math.round((done / course.lessons.length) * 100);
        const nextLesson = course.lessons.find((lesson) => !user.completed.includes(lesson.id)) || course.lessons[0];
        const content = nextLesson.content[lang];
        return (
          <main className="screen">
            <section className="course-hero card"><p className="eyebrow" style={{ color: "rgba(255,255,255,.82)" }}>{t.premiumTraining}</p><h1>{hero.title}<br /><span className="script">{hero.script}</span></h1><p>{hero.subtitle}</p></section>
            <div className="stats"><div className="stat"><strong>{course.lessons.length}</strong><span>{t.statsLessons}</span></div><div className="stat"><strong>{done}</strong><span>{t.statsDone}</span></div><div className="stat"><strong>{pct}%</strong><span>{t.statsProgress}</span></div></div>
            <section style={{ marginTop: 22 }} className="card">
              <div style={{ padding: 16, display: "grid", gridTemplateColumns: "1fr 74px", gap: 14, alignItems: "center" }}>
                <div><p className="eyebrow">{t.continueTraining}</p><h2 style={{ margin: "4px 0 8px", fontSize: 22, textTransform: "uppercase" }}>{content.title}</h2><p style={{ margin: 0, fontSize: 12, fontWeight: 700, lineHeight: 1.55 }}>{content.meta}</p></div>
                <div className="progress-ring" style={{ "--pct": `${pct}%` }}><span>{pct}%</span></div>
              </div>
              <div style={{ padding: "0 16px 16px" }}><button className="primary" onClick={() => { setActiveLessonId(nextLesson.id); setView("lesson"); }}>{t.openLesson}</button></div>
            </section>
            <section style={{ marginTop: 22 }}><div className="section-head"><div><h2>{t.today}</h2><p>{t.practicePlan}</p></div></div><div className="grid-2"><div className="resource"><strong>30 min</strong><span>{t.todayOne}</span></div><div className="resource"><strong>Photo</strong><span>{t.todayTwo}</span></div></div></section>
          </main>
        );

      function LessonsScreen({ course, t, lang, user, setActiveLessonId, setView }) {
        return <main className="screen"><div className="section-head"><div><h1>{t.lessons}</h1><p>{t.courseModules}</p></div></div><div className="lesson-list">{course.lessons.map((lesson, index) => {
          const content = lesson.content[lang];
          return <button className="lesson-card" key={lesson.id} onClick={() => { setActiveLessonId(lesson.id); setView("lesson"); }}><img className="lesson-thumb" src={lesson.poster} alt={content.title} /><div><h3>{String(index + 1).padStart(2, "0")} · {content.title}</h3><p>{content.meta}</p></div><span className="check">{user.completed.includes(lesson.id) ? "OK" : "GO"}</span></button>;
        })}</div></main>;
      }

      function LessonScreen({ t, lang, user, lesson, setUser, token }) {
        const content = lesson.content[lang];
        const isDone = user.completed.includes(lesson.id);
        const markDone = async () => {
          if (isDone) return;
          const completed = [...user.completed, lesson.id];
          await request("/api/progress", { method: "POST", headers: { Authorization: `Bearer ${token}` }, body: JSON.stringify({ completed }) });
          setUser({ ...user, completed });
        };
        const videoUrl = lesson.videoUrl || "";
        const youtubeId = videoUrl ? extractYoutubeId(videoUrl) : null;
        const isDirectVideo = videoUrl && !youtubeId;
        return (
          <main className="screen">
            {youtubeId ? (
              <div style={{ position: "relative", borderRadius: 8, overflow: "hidden", userSelect: "none" }}>
                <iframe
                  className="video-iframe"
                  src={`https://www.youtube.com/embed/${youtubeId}?rel=0&modestbranding=1&iv_load_policy=3&fs=1&playsinline=1`}
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
                  allowFullScreen
                />
                <div onContextMenu={(e) => e.preventDefault()} style={{ position: "absolute", top: 0, left: 0, right: 0, height: 48, zIndex: 10, cursor: "default" }} />
                <div className="watermark-center"><span>{user.name}</span></div>
              </div>
            ) : isDirectVideo ? (
              <div style={{ position: "relative", borderRadius: 8, overflow: "hidden", background: "#000" }}>
                <video controls controlsList="nodownload" onContextMenu={(e) => e.preventDefault()} style={{ width: "100%", maxHeight: 260, display: "block", background: "#000" }} src={videoUrl} />
                <div className="watermark-center"><span>{user.name}</span></div>
              </div>
            ) : (
              <div className="video-box" style={{ "--poster": `url(${lesson.poster})` }}><button className="play">▶</button><div className="watermark-center"><span>{user.name}</span></div></div>
            )}

          </main>
        );
      }

      function ResourcesScreen({ course, t, lang }) {
        return (
          <main className="screen">

            </section>
          </main>
        );

      function ShopScreen({ course, t, lang, cart, setCart }) {
        const [showCart, setShowCart] = useState(false);
        const products = course.products || [];
        const addToCart = (product) => {
          const exists = cart.find((i) => i.productId === product.id);
          setCart(exists ? cart.map((i) => i.productId === product.id ? { ...i, qty: i.qty + 1 } : i) : [...cart, { productId: product.id, qty: 1 }]);
        };
        const removeFromCart = (productId) => setCart(cart.filter((i) => i.productId !== productId));
        const cartCount = cart.reduce((s, i) => s + i.qty, 0);
        const cartTotal = cart.reduce((s, i) => { const p = products.find((x) => x.id === i.productId); return s + (p ? p.price * i.qty : 0); }, 0);
        const currency = cart.length ? (products.find((p) => p.id === cart[0].productId)?.currency || "USD") : "USD";
        const checkout = () => window.open("https://instagram.com/alex_kozak_", "_blank");
        return (
          <main className="screen">
            <div className="section-head">
              <div><h1>{t.shop}</h1><p>{lang === "ru" ? "Материалы для наращивания" : "Lash supplies & tools"}</p></div>
              {cartCount > 0 && (
                <button className="icon-button" style={{ position: "relative", gap: 4 }} onClick={() => setShowCart(!showCart)}>
                  🛒 <span style={{ fontWeight: 900 }}>{cartCount}</span>
                </button>
              )}
            </div>
            {showCart && cartCount > 0 && (
              <div className="cart-panel">
                <h3>{t.cartTitle}</h3>
                {cart.map((item) => {
                  const p = products.find((x) => x.id === item.productId);
                  if (!p) return null;
                  return (
                    <div className="cart-item" key={item.productId}>
                      <span>{p.content[lang].title} × {item.qty}</span>
                      <span style={{ fontWeight: 900, color: "var(--pink-dark)" }}>{p.price * item.qty} {p.currency}</span>
                      <button onClick={() => removeFromCart(item.productId)}>×</button>
                    </div>
                  );
                })}
                <div className="cart-total">{t.cartTotal}: {cartTotal} {currency}</div>
                <button className="primary" onClick={checkout}>{t.checkoutBtn}</button>
              </div>
            )}
            {products.length === 0 ? (
              <p className="notice" style={{ marginTop: 16 }}>{t.shopEmpty}</p>
            ) : (
              <div className="product-grid" style={{ marginTop: 16 }}>
                {products.filter((p) => p.inStock !== false || true).map((product) => {
                  const content = product.content[lang] || product.content["ru"] || {};
                  const inCart = cart.find((i) => i.productId === product.id);
                  return (
                    <div className="product-card" key={product.id}>
                      {product.image ? <img src={product.image} alt={content.title} /> : <div className="product-card-placeholder">💎</div>}
                      <div className="product-info">
                        <strong>{content.title}</strong>
                        {content.description && <p>{content.description}</p>}
                        <div className="product-footer">
                          <span className="product-price">{product.price} {product.currency}</span>
                          {product.inStock !== false ? (
                            <button className="primary" style={{ minHeight: 36, padding: "0 14px", fontSize: 11, width: "auto" }} onClick={() => addToCart(product)}>
                              {inCart ? `${t.inCart} (${inCart.qty})` : t.addToCart}
                            </button>
                          ) : <span className="sold-out">{t.outOfStock}</span>}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </main>
        );
      }

      function AdminScreen({ t, lang, setLang, client, course, setCourse }) {
        const [tab, setTab] = useState("students");
        const [adminState, setAdminState] = useState(null);
        const [openLessonId, setOpenLessonId] = useState(null);
        const [openResourceId, setOpenResourceId] = useState(null);
        const [openProductId, setOpenProductId] = useState(null);
        const [newCode, setNewCode] = useState("");
        const [editLang, setEditLang] = useState(lang);
        const [status, setStatus] = useState("");
        const [busy, setBusy] = useState(false);
        const adminHeaders = { Authorization: `Bearer ${client.adminToken}` };

        const loadAdmin = async () => {
          setBusy(true); setStatus("");
          try {
            const data = await request("/api/admin/state", { headers: adminHeaders });
            setAdminState(data); setCourse(data.course); setStatus(t.loaded);
          } catch (err) { setStatus(err.message || t.wrong); } finally { setBusy(false); }
        };
        useEffect(() => { loadAdmin(); }, []);

        const saveCourse = async (nextCourse) => {
          setBusy(true); setStatus("");
          try {
            const data = await request("/api/admin/course", { method: "PUT", headers: adminHeaders, body: JSON.stringify({ course: nextCourse }) });
            setCourse(data.course); setStatus(t.saved);
          } catch (err) { setStatus(err.message || t.wrong); } finally { setBusy(false); }
        };

        const createCode = async () => {
          setBusy(true); setStatus("");
          try {
            const data = await request("/api/admin/codes", { method: "POST", headers: adminHeaders, body: JSON.stringify({ code: newCode.trim() || undefined }) });
            setNewCode(""); setAdminState(data); setStatus(t.codeCopied);
          } catch (err) { setStatus(err.message || t.wrong); } finally { setBusy(false); }
        };
        const deleteCode = async (code) => {
          setBusy(true);
          try { setAdminState(await request(`/api/admin/codes/${encodeURIComponent(code)}`, { method: "DELETE", headers: adminHeaders })); setStatus(t.saved); }
          catch (err) { setStatus(err.message || t.wrong); } finally { setBusy(false); }
        };
        const resetStudent = async (code) => {
          setBusy(true);
          try { setAdminState(await request(`/api/admin/students/${encodeURIComponent(code)}`, { method: "DELETE", headers: adminHeaders })); setStatus(t.saved); }
          catch (err) { setStatus(err.message || t.wrong); } finally { setBusy(false); }
        };
        const copyCode = (code) => { navigator.clipboard?.writeText(code); setStatus(`${t.copied}: ${code}`); };
        const exitAdmin = () => { saveClient({ adminToken: null, token: null, user: null }); window.location.reload(); };

        const replaceLesson = (lesson) => saveCourse({ ...course, lessons: course.lessons.map((l) => l.id === lesson.id ? lesson : l) });
        const deleteLesson = (id) => { setOpenLessonId(null); saveCourse({ ...course, lessons: course.lessons.filter((l) => l.id !== id) }); };
        const addLesson = () => {
          const id = `lesson-${Date.now()}`;
          const lesson = { id, poster: "./assets/girls-miami-clean.png", videoUrl: "", content: { en: { title: "New Lesson", meta: "New module", note: "Description.", steps: ["Step 1"] }, ru: { title: "Новый урок", meta: "Модуль", note: "Описание.", steps: ["Шаг 1"] } } };
          setOpenLessonId(id); saveCourse({ ...course, lessons: [...course.lessons, lesson] });
        };

        const replaceResource = (resource) => saveCourse({ ...course, resources: course.resources.map((r) => r.id === resource.id ? resource : r) });
        const deleteResource = (id) => { setOpenResourceId(null); saveCourse({ ...course, resources: course.resources.filter((r) => r.id !== id) }); };
        const addResource = () => {
          const id = `resource-${Date.now()}`;
          const resource = { id, url: "", content: { en: { title: "New File", text: "Description or link." }, ru: { title: "Новый файл", text: "Описание или ссылка." } } };
          setOpenResourceId(id); saveCourse({ ...course, resources: [...course.resources, resource] });
        };

        const replaceProduct = (product) => saveCourse({ ...course, products: (course.products || []).map((p) => p.id === product.id ? product : p) });
        const deleteProduct = (id) => { setOpenProductId(null); saveCourse({ ...course, products: (course.products || []).filter((p) => p.id !== id) }); };
        const addProduct = () => {
          const id = `prod-${Date.now()}`;
          const product = { id, image: "", price: 0, currency: "USD", inStock: true, content: { en: { title: "New Product", description: "" }, ru: { title: "Новый товар", description: "" } } };
          setOpenProductId(id); saveCourse({ ...course, products: [...(course.products || []), product] });
        };

        const students = (adminState?.codes || []).filter(c => c.redeemed);
        const freeCodes = (adminState?.codes || []).filter(c => !c.redeemed);
        const totalLessons = course.lessons.length;

        return (
          <main className="screen">
            <div className="section-head"><div><h1>{t.admin}</h1><p>{t.settings}</p></div><button className="icon-button" onClick={() => setLang(lang === "en" ? "ru" : "en")}>{lang.toUpperCase()}</button></div>
            {status && <p className="status" style={{ marginBottom: 10 }}>{busy ? t.loading : status}</p>}
            {adminState && (
              <div className="stats" style={{ marginBottom: 14 }}>
                <div className="stat">
                  <strong style={{ fontSize: 22 }}>{students.length}</strong>
                  <span>{lang === "ru" ? "Учениц" : "Students"}</span>
                </div>
                <div className="stat">
                  <strong style={{ fontSize: 22 }}>{freeCodes.length}</strong>
                  <span>{lang === "ru" ? "Свободных кодов" : "Free codes"}</span>
                </div>
                <div className="stat">
                  <strong style={{ fontSize: 22 }}>
                    {students.length > 0 ? Math.round(students.reduce((s, c) => s + (totalLessons ? c.completed.length / totalLessons : 0), 0) / students.length * 100) : 0}%
                  </strong>
                  <span>{lang === "ru" ? "Средний прогресс" : "Avg. progress"}</span>
                </div>
              </div>
            )}
            <div className="admin-tabs">
              {[["students", lang === "ru" ? "Ученицы" : "Students"], ["content", t.content], ["products", t.products], ["data", t.data]].map(([id, label]) => (
                <button key={id} className={tab === id ? "active" : ""} onClick={() => setTab(id)}>
                  {id === "students" && students.length > 0 && <span style={{marginRight:4, background:"var(--pink)", color:"#fff", borderRadius:99, padding:"1px 5px", fontSize:8}}>{students.length}</span>}
                  {label}
                </button>
              ))}
            </div>

            {tab === "content" && (
              <div className="admin-panel">
                <label className="field-label">{t.editorLanguage}
                  <select className="select" value={editLang} onChange={(e) => setEditLang(e.target.value)}>
                    <option value="ru">Русский</option><option value="en">English</option>
                  </select>
                </label>
                <p style={{ margin: "4px 0 6px", fontSize: 11, fontWeight: 800, color: "rgba(29,29,29,.5)", textTransform: "uppercase" }}>{t.lessons}</p>
                <button className="secondary" style={{ width: "100%", marginBottom: 8 }} onClick={addLesson}>{t.addLesson}</button>
                <div style={{ display: "grid", gap: 6 }}>
                  {course.lessons.map((lesson, idx) => {
                    const c = lesson.content[editLang];
                    const isOpen = openLessonId === lesson.id;
                    return (
                      <div className="accordion-item" key={lesson.id}>
                        <button className="accordion-head" onClick={() => setOpenLessonId(isOpen ? null : lesson.id)}>
                          {lesson.poster ? <img src={lesson.poster} alt="" /> : <div className="accordion-head-placeholder">🎬</div>}
                          <div className="accordion-head-info"><strong>{String(idx+1).padStart(2,"0")} · {c.title}</strong><span>{c.meta}</span></div>
                          <span className="accordion-arrow">{isOpen ? "▲" : "▼"}</span>
                        </button>
                        {isOpen && <div className="accordion-body"><LessonEditor lesson={lesson} lang={editLang} t={t} replaceLesson={replaceLesson} deleteLesson={deleteLesson} /></div>}
                      </div>
                    );
                  })}
                </div>
                <p style={{ margin: "14px 0 6px", fontSize: 11, fontWeight: 800, color: "rgba(29,29,29,.5)", textTransform: "uppercase" }}>{t.files}</p>
                <button className="secondary" style={{ width: "100%", marginBottom: 8 }} onClick={addResource}>{t.addFile}</button>
                <div style={{ display: "grid", gap: 6 }}>
                  {course.resources.map((resource) => {
                    const c = resource.content[editLang];
                    const isOpen = openResourceId === resource.id;
                    return (
                      <div className="accordion-item" key={resource.id}>
                        <button className="accordion-head" onClick={() => setOpenResourceId(isOpen ? null : resource.id)}>
                          <div className="accordion-head-placeholder">📄</div>
                          <div className="accordion-head-info"><strong>{c.title}</strong><span>{resource.url ? "Ссылка добавлена" : "Без ссылки"}</span></div>
                          <span className="accordion-arrow">{isOpen ? "▲" : "▼"}</span>
                        </button>
                        {isOpen && <div className="accordion-body"><ResourceEditor resource={resource} lang={editLang} t={t} replaceResource={replaceResource} deleteResource={deleteResource} /></div>}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {tab === "products" && (
              <div className="admin-panel">
                <label className="field-label">{t.editorLanguage}
                  <select className="select" value={editLang} onChange={(e) => setEditLang(e.target.value)}>
                    <option value="ru">Русский</option><option value="en">English</option>
                  </select>
                </label>
                <button className="secondary" style={{ width: "100%", marginBottom: 8 }} onClick={addProduct}>{t.addProduct}</button>
                {(course.products || []).length === 0 && <p className="notice">{t.shopEmpty}</p>}
                <div style={{ display: "grid", gap: 8 }}>
                  {(course.products || []).map((product) => {
                    const c = product.content[editLang] || {};
                    const isOpen = openProductId === product.id;
                    return (
                      <div className="accordion-item" key={product.id}>
                        <button className="accordion-head" onClick={() => setOpenProductId(isOpen ? null : product.id)}>
                          {product.image ? <img src={product.image} alt="" /> : <div className="accordion-head-placeholder">📦</div>}
                          <div className="accordion-head-info">
                            <strong>{c.title || "—"}</strong>
                            <span>{product.price} {product.currency} · {product.inStock !== false ? (lang === "ru" ? "В наличии" : "In stock") : (lang === "ru" ? "Нет в наличии" : "Out of stock")}</span>
                          </div>
                          <span className="accordion-arrow">{isOpen ? "▲" : "▼"}</span>
                        </button>
                        {isOpen && <div className="accordion-body"><ProductEditor product={product} lang={editLang} t={t} replaceProduct={replaceProduct} deleteProduct={deleteProduct} /></div>}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {tab === "students" && (
              <div className="admin-panel">
                {/* ── Активные ученицы ── */}
                <p style={{ margin: "0 0 8px", fontSize: 11, fontWeight: 800, color: "rgba(29,29,29,.5)", textTransform: "uppercase" }}>
                  {lang === "ru" ? `Активных учениц: ${students.length}` : `Active students: ${students.length}`}
                </p>
                {students.length === 0 && <p className="notice">{lang === "ru" ? "Ещё никто не активировал код" : "No students yet"}</p>}
                <div style={{ display: "grid", gap: 10 }}>
                  {students.map((s) => {
                    const done = s.completed.length;
                    const pct = totalLessons > 0 ? Math.round((done / totalLessons) * 100) : 0;
                    const days = s.activatedAt ? Math.floor((Date.now() - new Date(s.activatedAt)) / 86400000) : 0;
                    const initials = s.studentName.split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2) || "?";
                    return (
                      <div className="student-card" key={s.code}>
                        <div className="student-head">
                          <div className="student-avatar">{initials}</div>
                          <div className="student-meta">
                            <strong>{s.studentName}</strong>
                            <span>{s.code}</span>
                          </div>
                          <span className="days-badge">📅 {days}{lang === "ru" ? " дн." : "d"}</span>
                        </div>
                        <div className="student-progress">
                          <div className="progress-bar-wrap">
                            <div className="progress-bar-fill" style={{ width: `${pct}%` }} />
                          </div>
                          <div className="progress-label">
                            <span>{done}/{totalLessons} {lang === "ru" ? "уроков" : "lessons"}</span>
                            <span style={{ color: pct === 100 ? "var(--pink-dark)" : undefined }}>{pct}% {pct === 100 ? "🎉" : ""}</span>
                          </div>
                        </div>
                        <div className="lesson-dots">
                          {course.lessons.map((lesson, idx) => (
                            <div key={lesson.id} className={`lesson-dot ${s.completed.includes(lesson.id) ? "done" : "pending"}`} title={lesson.content[lang]?.title || lesson.id}>
                              {s.completed.includes(lesson.id) ? "✓" : idx + 1}
                            </div>
                          ))}
                        </div>
                        <div className="student-actions">
                          <button className="secondary" style={{ fontSize: 11, minHeight: 34 }} onClick={() => copyCode(s.code)}>Copy код</button>
                          <button className="secondary" style={{ fontSize: 11, minHeight: 34 }} onClick={() => resetStudent(s.code)}>{t.resetStudent}</button>
                          <button className="danger" style={{ fontSize: 11, minHeight: 34 }} onClick={() => deleteCode(s.code)}>{t.delete}</button>
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* ── Создать новый код ── */}
                <p style={{ margin: "18px 0 8px", fontSize: 11, fontWeight: 800, color: "rgba(29,29,29,.5)", textTransform: "uppercase" }}>
                  {lang === "ru" ? "Коды доступа" : "Access codes"}
                </p>
                <div className="card" style={{ padding: 12 }}>
                  <label className="field-label">{t.newCode}
                    <input className="input" value={newCode} onChange={(e) => setNewCode(e.target.value.toUpperCase())} placeholder={lang === "ru" ? "Пусто = авто-генерация" : "Empty = auto generate"} />
                  </label>
                  <div style={{ height: 10 }} />
                  <button className="primary" disabled={busy} onClick={createCode}>{t.newCode}</button>
                </div>
                {freeCodes.length > 0 && (
                  <div style={{ display: "grid", gap: 8, marginTop: 8 }}>
                    {freeCodes.map((item) => (
                      <div className="admin-row" key={item.code}>
                        <div>
                          <strong>{item.code}</strong>
                          <span style={{ display: "block", marginTop: 2, color: "#2a8a2a" }}>● {t.available}</span>
                        </div>
                        <div className="row-actions">
                          <button className="secondary" onClick={() => copyCode(item.code)}>Copy</button>
                          <button className="danger" onClick={() => deleteCode(item.code)}>{t.delete}</button>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {tab === "data" && (
              <div className="admin-panel">
                <button className="secondary" onClick={loadAdmin}>{t.refresh}</button>
                <button className="danger" onClick={exitAdmin}>{t.exitAdmin}</button>
                <p className="notice">Данные хранятся в приватном репозитории GitHub: gtsafd/miami-lash-course-data</p>
              </div>
            )}
          </main>
        );
      }

      function LessonEditor({ lesson, lang, t, replaceLesson, deleteLesson }) {
        const initial = lesson.content[lang];
        const [draft, setDraft] = useState({ ...initial, stepsText: initial.steps.join("\n"), poster: lesson.poster, videoUrl: lesson.videoUrl || "" });
        useEffect(() => {
          const next = lesson.content[lang];
          setDraft({ ...next, stepsText: next.steps.join("\n"), poster: lesson.poster, videoUrl: lesson.videoUrl || "" });
        }, [lesson.id, lang]);
        const save = () => replaceLesson({ ...lesson, poster: draft.poster, videoUrl: draft.videoUrl, content: { ...lesson.content, [lang]: { title: draft.title, meta: draft.meta, note: draft.note, steps: draft.stepsText.split("\n").map((item) => item.trim()).filter(Boolean) } } });
        return (
          <div className="card admin-form" style={{ padding: 12 }}>
            <label className="field-label">{t.title}<input className="input" value={draft.title} onChange={(e) => setDraft({ ...draft, title: e.target.value })} /></label>
            <label className="field-label">{t.meta}<input className="input" value={draft.meta} onChange={(e) => setDraft({ ...draft, meta: e.target.value })} /></label>
            <label className="field-label">{t.note}<textarea className="textarea" value={draft.note} onChange={(e) => setDraft({ ...draft, note: e.target.value })} /></label>
            <label className="field-label">{t.steps}<textarea className="textarea" value={draft.stepsText} onChange={(e) => setDraft({ ...draft, stepsText: e.target.value })} /></label>
            <label className="field-label">{t.poster}<input className="input" value={draft.poster} onChange={(e) => setDraft({ ...draft, poster: e.target.value })} /></label>
            <label className="field-label">
              {lang === "ru" ? "Ссылка на видео (YouTube или MP4)" : "Video URL (YouTube or MP4)"}
              <input className="input" value={draft.videoUrl} onChange={(e) => setDraft({ ...draft, videoUrl: e.target.value })} placeholder="https://youtube.com/watch?v=... или https://.../video.mp4" />
            </label>
            {draft.videoUrl && (
              <p style={{ margin: "2px 0", fontSize: 11, fontWeight: 700, color: "var(--pink-dark)" }}>
                {extractYoutubeId(draft.videoUrl) ? "YouTube видео" : "Прямая ссылка на видео"}
              </p>
            )}
            <div className="admin-actions"><button className="primary" onClick={save}>{t.saveLesson}</button><button className="danger" onClick={() => deleteLesson(lesson.id)}>{t.delete}</button></div>
          </div>
        );
      }

      function ResourceEditor({ resource, lang, t, replaceResource, deleteResource }) {
        const initial = resource.content[lang];
        const [draft, setDraft] = useState({ ...initial, url: resource.url || "" });
        useEffect(() => setDraft({ ...resource.content[lang], url: resource.url || "" }), [resource.id, lang]);
        const save = () => replaceResource({ ...resource, url: draft.url, content: { ...resource.content, [lang]: { title: draft.title, text: draft.text } } });
        return (
          <div className="card admin-form" style={{ padding: 12 }}>
            <label className="field-label">{t.resourcesTitle}<input className="input" value={draft.title} onChange={(e) => setDraft({ ...draft, title: e.target.value })} /></label>
            <label className="field-label">{t.resourcesText}<textarea className="textarea" value={draft.text} onChange={(e) => setDraft({ ...draft, text: e.target.value })} /></label>
            <label className="field-label">
              {lang === "ru" ? "Ссылка на файл / материал" : "File or resource URL"}
              <input className="input" value={draft.url} onChange={(e) => setDraft({ ...draft, url: e.target.value })} placeholder="https://drive.google.com/... или https://..." />
            </label>
            <div className="admin-actions"><button className="primary" onClick={save}>{t.saveFile}</button><button className="danger" onClick={() => deleteResource(resource.id)}>{t.delete}</button></div>
          </div>
        );
      }

      function ProductEditor({ product, lang, t, replaceProduct, deleteProduct }) {
        const initial = product.content[lang] || {};
        const [draft, setDraft] = useState({
          title: initial.title || "", description: initial.description || "",
          image: product.image || "", price: product.price || 0,
          currency: product.currency || "USD", inStock: product.inStock !== false
        });
        useEffect(() => {
          const c = product.content[lang] || {};
          setDraft({ title: c.title || "", description: c.description || "", image: product.image || "", price: product.price || 0, currency: product.currency || "USD", inStock: product.inStock !== false });
        }, [product.id, lang]);
        const save = () => replaceProduct({ ...product, image: draft.image, price: Number(draft.price), currency: draft.currency, inStock: draft.inStock, content: { ...product.content, [lang]: { title: draft.title, description: draft.description } } });
        return (
          <div className="admin-form" style={{ paddingTop: 10 }}>
            {draft.image && <img src={draft.image} alt="" style={{ width: "100%", height: 140, objectFit: "cover", borderRadius: 8, marginBottom: 10 }} onError={(e) => e.target.style.display="none"} />}
            <label className="field-label">{t.productImage}<input className="input" value={draft.image} onChange={(e) => setDraft({ ...draft, image: e.target.value })} placeholder="https://..." /></label>
            <label className="field-label">{t.productTitle}<input className="input" value={draft.title} onChange={(e) => setDraft({ ...draft, title: e.target.value })} /></label>
            <label className="field-label">{t.productDesc}<textarea className="textarea" style={{ minHeight: 68 }} value={draft.description} onChange={(e) => setDraft({ ...draft, description: e.target.value })} /></label>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 100px", gap: 8 }}>
              <label className="field-label">{t.productPrice}<input className="input" type="number" min="0" value={draft.price} onChange={(e) => setDraft({ ...draft, price: e.target.value })} /></label>
              <label className="field-label">{t.productCurrency}
                <select className="select" value={draft.currency} onChange={(e) => setDraft({ ...draft, currency: e.target.value })}>
                  <option value="USD">USD</option><option value="EUR">EUR</option><option value="UAH">UAH</option><option value="RUB">RUB</option>
                </select>
              </label>
            </div>
            <label className="instock-toggle">
              <input type="checkbox" checked={draft.inStock} onChange={(e) => setDraft({ ...draft, inStock: e.target.checked })} style={{ width: 18, height: 18, accentColor: "var(--pink)" }} />
              {t.inStock}
            </label>
            <div className="admin-actions" style={{ marginTop: 6 }}>
              <button className="primary" onClick={save}>{t.saveProduct}</button>
              <button className="danger" onClick={() => deleteProduct(product.id)}>{t.delete}</button>
            </div>
          </div>
        );
      }

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations?.().then((registrations) => {
          registrations.forEach((registration) => registration.unregister());
        }).catch(() => {});
      }
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
